// NOTE: computed lazily (function, not module-const) because in the single-file
// build the `ALL_CAMPAIGNS` alias is injected at the end — a top-level const here
// would hit a temporal-dead-zone error.
const getProductList = () => [...new Map(ALL_CAMPAIGNS.map((c) => [c.asin, { asin: c.asin, title: c.product, brand: (c.product || 'Brightleaf').split(' ')[0] }])).values()]
const WIZ_TYPES = [
  { v: 'SP-Auto', t: 'Sponsored Products — Auto', s: 'Amazon matches your ASINs to relevant shopper searches.' },
  { v: 'SP-Manual', t: 'Sponsored Products — Manual', s: 'You choose keywords and match types.' },
  { v: 'PAT', t: 'Product Targeting (PAT)', s: 'Target specific ASINs or categories directly.' },
]
const WIZ_MATCHES = ['Broad', 'Phrase', 'Exact']
const WIZ_THEMES = [
  { v: 'Branded', s: 'Your own brand terms — defend & convert.' },
  { v: 'Category', s: 'Generic category terms — reach new shoppers.' },
  { v: 'Competitor', s: 'Competitor brand / ASIN terms — conquest.' },
]

function CreateCampaignWizard({ products, profileId, currency = '$', onClose, onLaunch }) {
  const [step, setStep] = useState(0)
  const today = new Date().toISOString().slice(0, 10)
  const [f, setF] = useState({
    products: [], dailyBudget: '50', startDate: today, endDate: '',
    type: 'SP-Auto', matches: ['Exact'], themes: ['Branded'],
    naming: '{brand}-{asin}-{type}-{theme}',
    ai: false, aiTarget: 'ACoS', aiValue: '25', maxBid: '1.20', priority: 'Balanced',
  })
  const set = (patch) => setF((x) => ({ ...x, ...patch }))
  const toggleIn = (key, val) => set({ [key]: f[key].includes(val) ? f[key].filter((v) => v !== val) : [...f[key], val] })
  const isManual = f.type === 'SP-Manual'
  const groupCount = (isManual ? Math.max(1, f.matches.length) : 1) * Math.max(1, f.themes.length)
  const steps = ['Products', 'Daily budget', 'Schedule', 'Campaign type', 'Ad groups', 'Targeting themes', 'Naming', 'Optimization', 'Review']
  const last = steps.length - 1
  const canNext = () => {
    if (step === 0) return f.products.length > 0
    if (step === 1) return Number(f.dailyBudget) > 0
    if (step === 2) return !!f.startDate
    if (step === 4) return isManual ? f.matches.length > 0 : true
    if (step === 5) return f.themes.length > 0
    if (step === 6) return f.naming.trim().length > 0
    return true
  }
  const sampleName = (asin) => {
    const p = products.find((x) => x.asin === asin) || products[0] || { brand: 'Brand', asin: 'ASIN' }
    return f.naming
      .replaceAll('{brand}', p.brand || 'Brand').replaceAll('{asin}', asin || p.asin)
      .replaceAll('{type}', f.type).replaceAll('{theme}', f.themes[0] || 'General')
      .replaceAll('{match}', isManual ? (f.matches[0] || 'Exact') : (f.type === 'PAT' ? 'PAT' : 'Auto'))
  }
  const launch = () => {
    const tgt = { 'SP-Auto': 'Auto', 'SP-Manual': 'Manual', PAT: 'Product' }[f.type]
    const zero = { impr: 0, clk: 0, ctr: 0, cpc: 0, spend: 0, cvr: 0, orders: 0, asp: 0, aov: 0, sales: 0, units: 0, ntb: 0, atc: 0, acos: 0, roas: 0, cpa: 0 }
    const camps = f.products.map((asin, i) => {
      const p = products.find((x) => x.asin === asin) || {}
      return {
        id: 'CNEW' + (Date.now() + i).toString().slice(-7),
        name: sampleName(asin), asin, product: p.title || asin, profileId,
        state: 'Enabled', status: 'Enabled', campaignType: f.type, targetingType: tgt,
        adGroups: { active: groupCount, total: groupCount }, dailyBudget: Number(f.dailyBudget),
        actlBid: Number(f.maxBid) || 1, avlBid: round2((Number(f.maxBid) || 1) * 1.3),
        portfolio: 'New Launch', bidStrategy: 'Dynamic - down only',
        tag: 'NEW', startDate: f.startDate, endDate: f.endDate, ai: f.ai, ...zero,
      }
    })
    onLaunch(camps)
  }
  const renderStep = () => {
    if (step === 0) return (
      <>
        <div className="wiz-hint">Choose the products to advertise. One campaign is created per product.</div>
        <div className="prodlist">
          {products.map((p) => {
            const on = f.products.includes(p.asin)
            return (
              <div key={p.asin} className="prodrow" onClick={() => toggleIn('products', p.asin)}>
                <Check on={on} onClick={() => {}} />
                <div style={{ flex: 1 }}>{p.title}<div className="pr-asin">{p.asin} · {p.brand}</div></div>
              </div>
            )
          })}
        </div>
      </>
    )
    if (step === 1) return (
      <>
        <label className="fld">Daily budget ({currency}) per campaign<input type="number" autoFocus value={f.dailyBudget} onChange={(e) => set({ dailyBudget: e.target.value })} /></label>
        <div className="modal-note"><Icon name="bulb" size={14} />Applies to each of the {f.products.length} campaign{f.products.length === 1 ? '' : 's'} you're creating.</div>
      </>
    )
    if (step === 2) return (
      <div className="rb-grid2">
        <label className="fld">Start date<input type="date" value={f.startDate} onChange={(e) => set({ startDate: e.target.value })} /></label>
        <label className="fld">End date (optional)<input type="date" value={f.endDate} onChange={(e) => set({ endDate: e.target.value })} /></label>
      </div>
    )
    if (step === 3) return (
      <div className="opt-grid">
        {WIZ_TYPES.map((o) => (
          <div key={o.v} className={`opt-card ${f.type === o.v ? 'on' : ''}`} onClick={() => set({ type: o.v })}>
            <span className="opt-radio" /><div><div className="oc-title">{o.t}</div><div className="oc-sub">{o.s}</div></div>
          </div>
        ))}
      </div>
    )
    if (step === 4) return isManual ? (
      <>
        <div className="wiz-hint">Split into one ad group per match type.</div>
        <div className="chip-pick">{WIZ_MATCHES.map((m) => <span key={m} className={`chip ${f.matches.includes(m) ? 'on' : ''}`} onClick={() => toggleIn('matches', m)}>{m}</span>)}</div>
      </>
    ) : (
      <div className="modal-note"><Icon name="bulb" size={14} />{f.type === 'SP-Auto' ? 'Auto campaigns use a single auto-targeting ad group.' : 'PAT campaigns target products/categories in one ad group.'}</div>
    )
    if (step === 5) return (
      <>
        <div className="wiz-hint">Group targets by intent — creates a themed ad group for each.</div>
        <div className="opt-grid">
          {WIZ_THEMES.map((o) => {
            const on = f.themes.includes(o.v)
            return (
              <div key={o.v} className={`opt-card ${on ? 'on' : ''}`} onClick={() => toggleIn('themes', o.v)}>
                <Check on={on} onClick={() => {}} /><div><div className="oc-title">{o.v}</div><div className="oc-sub">{o.s}</div></div>
              </div>
            )
          })}
        </div>
      </>
    )
    if (step === 6) return (
      <>
        <label className="fld">Naming template<input value={f.naming} onChange={(e) => set({ naming: e.target.value })} /></label>
        <div style={{ marginBottom: 10 }}>{['{brand}', '{asin}', '{type}', '{theme}', '{match}'].map((v) => <span key={v} className="varchip" onClick={() => set({ naming: f.naming + v })}>{v}</span>)}</div>
        <div className="wiz-hint">Preview</div>
        <div className="namepreview">{sampleName(f.products[0])}</div>
      </>
    )
    if (step === 7) return (
      <>
        <label className="rb-check" style={{ marginBottom: 14 }}><Toggle on={f.ai} onClick={() => set({ ai: !f.ai })} /> Enable Campaign AI (automated bidding + pacing)</label>
        {f.ai ? (
          <>
            <div className="rb-grid2">
              <label className="fld">Optimize for<select value={f.aiTarget} onChange={(e) => set({ aiTarget: e.target.value })}><option>ACoS</option><option>ROAS</option></select></label>
              <label className="fld">Target {f.aiTarget}{f.aiTarget === 'ACoS' ? ' (%)' : ''}<input type="number" value={f.aiValue} onChange={(e) => set({ aiValue: e.target.value })} /></label>
            </div>
            <div className="rb-grid2">
              <label className="fld">Max bid ({currency})<input type="number" value={f.maxBid} onChange={(e) => set({ maxBid: e.target.value })} /></label>
              <label className="fld">Priority<select value={f.priority} onChange={(e) => set({ priority: e.target.value })}><option>Balanced</option><option>Spend</option><option>Performance</option></select></label>
            </div>
          </>
        ) : (
          <div className="modal-note"><Icon name="bulb" size={14} />Without AI, bids start at your max-bid default — attach Rules later for automation.</div>
        )}
      </>
    )
    return (
      <table className="review-tbl"><tbody>
        <tr><td>Products</td><td>{f.products.length} selected</td></tr>
        <tr><td>Daily budget</td><td>{currency}{f.dailyBudget} each</td></tr>
        <tr><td>Schedule</td><td>{f.startDate}{f.endDate ? ` → ${f.endDate}` : ' → no end date'}</td></tr>
        <tr><td>Type</td><td>{f.type}</td></tr>
        <tr><td>Ad groups</td><td>{groupCount} per campaign{isManual ? ` · ${f.matches.join(', ')}` : ''}</td></tr>
        <tr><td>Themes</td><td>{f.themes.join(', ')}</td></tr>
        <tr><td>Campaign AI</td><td>{f.ai ? `On · Target ${f.aiTarget} ${f.aiValue}${f.aiTarget === 'ACoS' ? '%' : ''} · Max bid ${currency}${f.maxBid}` : 'Off'}</td></tr>
        <tr><td>Example name</td><td style={{ fontFamily: 'ui-monospace, monospace', fontSize: 11.5 }}>{sampleName(f.products[0])}</td></tr>
      </tbody></table>
    )
  }
  return (
    <Modal width={640} title="Create Campaign" sub="Super Wizard — build one or many campaigns" onClose={onClose}
      footer={<>
        {step > 0 && <Btn ghost onClick={() => setStep(step - 1)}>Back</Btn>}
        <div style={{ flex: 1 }} />
        <span className="muted" style={{ fontSize: 11 }}>Step {step + 1} of {steps.length}</span>
        {step < last
          ? <Btn primary disabled={!canNext()} onClick={() => setStep(step + 1)}>Next</Btn>
          : <Btn primary icon="check" onClick={launch}>Launch {f.products.length} campaign{f.products.length === 1 ? '' : 's'}</Btn>}
      </>}>
      <div className="wiz-steps">
        {steps.map((s, i) => (
          <span key={s} className={`wiz-step ${i === step ? 'on' : i < step ? 'done' : ''}`}><span className="num">{i < step ? '✓' : i + 1}</span>{s}</span>
        ))}
      </div>
      <div className="wiz-progress"><span style={{ width: ((step + 1) / steps.length * 100) + '%' }} /></div>
      <div className="wiz-body"><div className="wiz-title">{steps[step]}</div>{renderStep()}</div>
    </Modal>
  )
}

function KpiRow({ rows, prev }) {
  const a = aggregate(rows)
  const p = prev && prev.length ? aggregate(prev) : null
  const dl = (cur, prv) => (p && prv ? ((cur - prv) / Math.abs(prv)) * 100 : undefined)
  return (
    <KpiGrid>
      <Kpi label="Impressions" value={compact(a.impr)} delta={dl(a.impr, p?.impr)} />
      <Kpi label="Clicks" value={compact(a.clk)} delta={dl(a.clk, p?.clk)} />
      <Kpi label="CTR" value={pct(a.ctr, 2)} delta={dl(a.ctr, p?.ctr)} />
      <Kpi label="Spend" value={money(a.spend)} delta={dl(a.spend, p?.spend)} deltaGood={(dl(a.spend, p?.spend) || 0) <= 0} />
      <Kpi label="Sales" value={money(a.sales)} delta={dl(a.sales, p?.sales)} />
      <Kpi label="ACoS" value={pct(a.acos)} delta={dl(a.acos, p?.acos)} deltaGood={(dl(a.acos, p?.acos) || 0) <= 0} />
      <Kpi label="ROAS" value={dec2(a.roas)} delta={dl(a.roas, p?.roas)} />
      <Kpi label="Orders" value={compact(a.orders)} delta={dl(a.orders, p?.orders)} />
    </KpiGrid>
  )
}

/* ============================ CAMPAIGNS ============================ */
function Campaigns() {
  const { profileId, rangeResolved } = useApp()
  const [created, setCreated] = useState(() => createdStore.get('campaigns'))
  const allCampaigns = useMemo(() => [...created, ...ALL_CAMPAIGNS], [created])
  const base = useProfileFilter(allCampaigns)
  const [overrides, setOverrides] = usePersistentOverrides('ads-campaigns')
  const [q, setQ] = useState('')
  const [filters, setFilters] = useState(() => loadFilterModel('ads-campaigns'))
  const [sel, setSel] = useState(new Set())

  const [modal, setModal] = useState(null) // 'bid' | 'budget' | 'tag'
  const [wizard, setWizard] = useState(false)
  const onLaunch = (camps) => { const next = [...camps, ...created]; createdStore.set('campaigns', next); setCreated(next); setWizard(false); toast(`Launched ${camps.length} campaign${camps.length === 1 ? '' : 's'} — added to the grid`) }

  const withEdits = base.map((c) => (overrides[c.id] ? { ...c, ...overrides[c.id] } : c))
  const { rows: data, prev } = useMemo(() => scaleForRange(withEdits, rangeResolved), [withEdits, rangeResolved])
  const searched = data.filter((c) => c.name.toLowerCase().includes(q.toLowerCase()))
  const filtered = applyFilters(searched, filters, CAMPAIGN_FIELDS)
  const prevFiltered = filtered.map((r) => prev[r.id])

  const merge = (id, patch) => setOverrides((o) => ({ ...o, [id]: { ...o[id], ...patch } }))
  const mergeMany = (ids, fn) => setOverrides((o) => { const n = { ...o }; ids.forEach((id) => { n[id] = { ...n[id], ...fn(id) } }); return n })
  const statusFor = (st) => (st === 'Enabled' ? 'Enabled' : st) // Paused / Archived pass through
  const setState = (id, st) => merge(id, { state: st, status: statusFor(st) })
  const byId = Object.fromEntries(data.map((c) => [c.id, c]))

  const bulkState = (st) => { const ids = [...sel]; mergeMany(ids, () => ({ state: st, status: statusFor(st) })); setSel(new Set()); toast(`${ids.length} campaign${ids.length === 1 ? '' : 's'} ${st.toLowerCase()}`) }
  const applyBulkBid = (mode, amt) => { const ids = [...sel]; mergeMany(ids, (id) => ({ actlBid: applyBidOp(byId[id].actlBid, byId[id].avlBid, mode, amt) })); setSel(new Set()); setModal(null); toast(`Updated bids on ${ids.length} campaign${ids.length === 1 ? '' : 's'} — all succeeded`) }
  const applyBulkBudget = (mode, amt) => { const ids = [...sel]; mergeMany(ids, (id) => ({ dailyBudget: applyBudgetOp(byId[id].dailyBudget, mode, amt) })); setSel(new Set()); setModal(null); toast(`Updated daily budget on ${ids.length} campaign${ids.length === 1 ? '' : 's'}`) }
  const applyBulkTag = (tag) => { const ids = [...sel]; mergeMany(ids, () => ({ tag })); setSel(new Set()); setModal(null); toast(`Tagged ${ids.length} campaign${ids.length === 1 ? '' : 's'} “${tag}”`) }
  const bulkNoop = (label) => { const n = sel.size; setSel(new Set()); toast(`${label} applied to ${n} campaign${n === 1 ? '' : 's'}`) }

  const toggleSel = (id) => setSel((s) => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n })
  const toggleAll = () => setSel((s) => (s.size === filtered.length ? new Set() : new Set(filtered.map((r) => r.id))))

  const columns = [
    { key: 'name', label: 'Campaign', sticky: true, width: 320, sortVal: (r) => r.name, render: (r) => (
      <div><div><Link className="celllink" to={`/ads/adgroups?camp=${r.id}`} title="Drill into ad groups">{r.name}</Link>{r.tag && <span className="tag" style={{ marginLeft: 6 }}>{r.tag}</span>}</div><small>{r.profileId.toUpperCase()} · {r.product?.split('—')[0]}</small></div>) },
    { key: 'state', label: 'State', render: (r) => <StateSelect value={r.state} onChange={(st) => setState(r.id, st)} /> },
    { key: 'status', label: 'Status', render: (r) => <Pill>{r.status}</Pill> },
    { key: 'campaignType', label: 'Type', render: (r) => <span className={`pill ${typeTone(r.campaignType)}`} style={{ borderRadius: 5 }}>{r.campaignType}</span> },
    { key: 'adGroups', label: 'Ad Groups', num: true, sort: false, render: (r) => <span className="muted">{r.adGroups.active}/{r.adGroups.total}</span> },
    { key: 'dailyBudget', label: 'Daily Budget', num: true, foot: (rs) => cur(sumKey('dailyBudget')(rs), symOf(rs), 0), render: (r) => (
      <EditableNum value={r.dailyBudget} prefix={symA(r.profileId)} dec={0} onCommit={(v) => { merge(r.id, { dailyBudget: v }); toast(`Daily budget set to ${cur(v, symA(r.profileId), 0)}`) }} />) },
    { key: 'bid', label: 'Bid (Act/Avl)', num: true, sort: false, render: (r) => <span className="muted">{r.actlBid} / {r.avlBid}</span> },
    { key: 'impr', label: 'Impr.', num: true, delta: true, foot: (rs) => compact(aggregate(rs).impr), render: (r) => compact(r.impr) },
    { key: 'clk', label: 'Clicks', num: true, delta: true, foot: (rs) => int(aggregate(rs).clk), render: (r) => int(r.clk) },

    { key: 'sales', label: 'Sales', num: true, delta: true, foot: (rs) => cur(aggregate(rs).sales, symOf(rs)), render: (r) => cur(r.sales, symA(r.profileId)) },

    { key: 'acos', label: 'ACoS', num: true, delta: true, foot: (rs) => pct(aggregate(rs).acos), render: (r) => <span style={{ color: r.acos > 40 ? 'var(--red)' : r.acos < 25 ? 'var(--green)' : 'inherit', fontWeight: 600 }}>{pct(r.acos)}</span> },

  ]

  const presets = {
    Default: ['name', 'state', 'status', 'campaignType', 'adGroups', 'dailyBudget', 'bid', 'impr', 'clk', 'ctr', 'spend', 'cpc', 'sales', 'orders', 'cvr', 'acos', 'roas', 'ntb'],
    Performance: ['name', 'state', 'impr', 'clk', 'ctr', 'spend', 'cpc', 'sales', 'orders', 'cvr', 'acos', 'roas'],
    'Target ACOS': ['name', 'state', 'dailyBudget', 'spend', 'sales', 'acos', 'roas', 'cpc', 'orders'],
  }
  const dims = [
    { key: 'campaignType', label: 'Campaign Type' },
    { key: 'portfolio', label: 'Portfolio' },
    { key: 'targetingType', label: 'Targeting' },
    { key: 'profileId', label: 'Profile' },
  ]

  return (
    <>
      <AdsHead title="Campaigns" sub={`${filtered.length} campaigns · ${rangeResolved.label} · Sponsored Products, Brands & Display`}>
        <ExportMenu name="campaigns" fields={CAMPAIGN_FIELDS} rows={filtered} />
        <Btn icon="plus" primary onClick={() => setWizard(true)}>Create Campaign</Btn>

/* ============================ AD GROUPS ============================ */
const agHash = (s) => { let h = 2166136261; for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619) } return ((h >>> 0) % 1000) / 1000 }
const AG_NAMES = ['Branded', 'Category', 'Competitor', 'Auto Catch-All', 'Top ASINs', 'Generic']
// Split a campaign's metrics across its ad groups (deterministic weights). Used by drill-down.
function adGroupsForCampaign(c) {
  const n = Math.max(1, c.adGroups?.total || 1)
  const w = Array.from({ length: n }, (_, i) => 0.6 + agHash(c.id + ':agw' + i))
  const sumW = w.reduce((a, b) => a + b, 0)
  return w.map((wi, i) => {
    const f = wi / sumW
    const impr = Math.round((c.impr || 0) * f), clk = Math.round((c.clk || 0) * f)
    const spend = (c.spend || 0) * f, sales = (c.sales || 0) * f, orders = Math.round((c.orders || 0) * f)
    return {
      id: c.id + '-ag' + (i + 1), name: c.name.split('-').slice(0, 2).join('-') + ' · ' + AG_NAMES[i % AG_NAMES.length],
      campaign: c.name, campaignId: c.id, profileId: c.profileId, state: i === 0 ? c.state : (agHash(c.id + 's' + i) > 0.25 ? 'Enabled' : 'Paused'),
      defaultBid: c.actlBid, targets: 3 + Math.round(agHash(c.id + 'tg' + i) * 9),
      impr, clk, spend, sales, orders,
      ctr: impr ? (clk / impr) * 100 : 0, acos: sales ? (spend / sales) * 100 : 0, roas: spend ? sales / spend : 0,
    }
  })
}

/* ===================== src/pages/Automation.jsx ===================== */

function AutoHead({ title, sub, children }) {
  return <div className="page-head"><div><div className="page-title">{title}</div><div className="page-sub">{sub}</div></div><div className="page-actions">{children}</div></div>
}
const RULE_ICON = { Bid: 'target', Harvest: 'spark', Negative: 'x', Retail: 'shield', Dayparting: 'clock', Budget: 'wallet' }
const RULE_COLOR = { Bid: 'var(--brand)', Harvest: 'var(--green)', Negative: 'var(--red)', Retail: 'var(--purple)', Dayparting: 'var(--amber)', Budget: 'var(--brand-2)' }

/* ---- Rule builder ---- */
const RB_METRICS = ['ROAS', 'ACoS', 'CVR', 'CPC', 'CTR', 'Impressions', 'Clicks', 'Spend', 'Orders', 'Organic Rank', 'SOV', 'Weeks of Cover']
const RB_PCT = new Set(['ACoS', 'CTR', 'CVR', 'SOV'])
const RB_OPS = [['gt', '>'], ['gte', '≥'], ['lt', '<'], ['lte', '≤'], ['between', 'between']]
const RB_TYPES = ['Bid', 'Harvest', 'Negative', 'Dayparting', 'Budget', 'Retail']
const RB_SCOPES = ['All SP campaigns', 'Selected campaigns', 'Ad groups', 'By tag', 'All profiles']
const RB_FREQ = ['Hourly', 'Every 6 hours', 'Daily', 'Every 2 days']
const RB_ACTIONS = [
  ['dec_bid', 'Decrease bid by %'], ['inc_bid', 'Increase bid by %'], ['set_bid', 'Set bid to value'],
  ['ceil_bid', 'Set bid ceiling'], ['floor_bid', 'Set bid floor'], ['pause', 'Pause'], ['enable', 'Enable'],
  ['adj_budget', 'Adjust daily budget by %'], ['placement', 'Set placement modifier %'],
  ['harvest', 'Harvest as keyword'], ['negative', 'Add as negative'],
]
const RB_NEEDS_VAL = new Set(['dec_bid', 'inc_bid', 'set_bid', 'ceil_bid', 'floor_bid', 'adj_budget', 'placement'])
const rid = () => Math.random().toString(36).slice(2, 7)
const opSym = (op) => ({ gt: '>', gte: '≥', lt: '<', lte: '≤', between: 'between' }[op] || op)
const buildTrigger = (f) => {
  const parts = f.conditions.filter((c) => c.value !== '' || c.op === 'between').map((c) => {
    const suf = RB_PCT.has(c.metric) ? '%' : ''
    if (c.op === 'between') return `${c.metric} between ${c.value || '…'}${suf} and ${c.value2 || '…'}${suf}`
    return `${c.metric} ${opSym(c.op)} ${c.value}${suf}`
  })
  let s = parts.join(` ${f.join} `)
  const gates = []
  if (f.minClicks) gates.push(`min ${f.minClicks} clicks`)
  if (f.minSpend) gates.push(`min $${f.minSpend} spend`)
  s += ` (${f.lookback}d${f.excludeLatest ? ', excl. latest day' : ''}${gates.length ? ', ' + gates.join(', ') : ''})`
  return s
}
const buildAction = (f) => {
  const v = f.actionValue
  return {
    dec_bid: `Decrease bid by ${v}%`, inc_bid: `Increase bid by ${v}%`, set_bid: `Set bid to $${v}`,
    ceil_bid: `Set bid ceiling $${v}`, floor_bid: `Set bid floor $${v}`, pause: 'Pause', enable: 'Enable',
    adj_budget: `Adjust daily budget by ${v}%`, placement: `Set placement modifier ${v}%`,
    harvest: 'Harvest as keyword to manual', negative: 'Add as negative exact',
  }[f.action] || f.action
}

function RuleBuilder({ onClose, onSave }) {
  const [f, setF] = useState({
    name: '', type: 'Bid', scope: 'All SP campaigns',
    conditions: [{ id: rid(), metric: 'ACoS', op: 'gt', value: '', value2: '' }],
    join: 'AND', lookback: '14', excludeLatest: true, minClicks: '', minSpend: '',
    action: 'dec_bid', actionValue: '', frequency: 'Every 6 hours',
  })
  const upd = (patch) => setF((x) => ({ ...x, ...patch }))
  const setCond = (i, patch) => setF((x) => ({ ...x, conditions: x.conditions.map((c, j) => (j === i ? { ...c, ...patch } : c)) }))
  const addCond = () => setF((x) => ({ ...x, conditions: [...x.conditions, { id: rid(), metric: 'ROAS', op: 'gt', value: '', value2: '' }] }))
  const delCond = (i) => setF((x) => ({ ...x, conditions: x.conditions.filter((c, j) => j !== i) }))
  const needsVal = RB_NEEDS_VAL.has(f.action)
  const canSave = f.name.trim() && f.conditions.some((c) => c.value !== '') && (!needsVal || f.actionValue !== '')
  const save = () => onSave({
    id: 'RNEW' + Date.now().toString().slice(-5), name: f.name.trim(), type: f.type, scope: f.scope,
    status: 'Active', trigger: buildTrigger(f), action: buildAction(f), runs: f.frequency, lastRun: 'just now', affected: 0,
  })
  return (
    <Modal width={600} title="Create Rule" sub="IF conditions are met, THEN apply an action — on a schedule" onClose={onClose}
      footer={<><Btn ghost onClick={onClose}>Cancel</Btn><div style={{ flex: 1 }} /><Btn primary disabled={!canSave} icon="check" onClick={save}>Create rule</Btn></>}>
      <label className="fld">Rule name<input autoFocus value={f.name} placeholder="e.g. Defend Target ACoS ≤ 28%" onChange={(e) => upd({ name: e.target.value })} /></label>
      <div className="rb-grid2">
        <label className="fld">Rule type<select value={f.type} onChange={(e) => upd({ type: e.target.value })}>{RB_TYPES.map((t) => <option key={t}>{t}</option>)}</select></label>
        <label className="fld">Scope<select value={f.scope} onChange={(e) => upd({ scope: e.target.value })}>{RB_SCOPES.map((s) => <option key={s}>{s}</option>)}</select></label>
      </div>
      <div className="cm-head" style={{ padding: '4px 0 8px' }}>IF — conditions</div>
      {f.conditions.map((c, i) => (
        <div key={c.id} className="rb-row">
          <span className="rb-join">{i === 0 ? 'IF' : f.join}</span>
          <select className="rb-metric" value={c.metric} onChange={(e) => setCond(i, { metric: e.target.value })}>{RB_METRICS.map((m) => <option key={m}>{m}</option>)}</select>
          <select value={c.op} onChange={(e) => setCond(i, { op: e.target.value, ...(e.target.value !== 'between' ? { value2: '' } : {}) })}>{RB_OPS.map(([v, l]) => <option key={v} value={v}>{l}</option>)}</select>
          <input className="rb-val" type="number" value={c.value} placeholder="value" onChange={(e) => setCond(i, { value: e.target.value })} />
          {c.op === 'between' && <><span className="muted">and</span><input className="rb-val" type="number" value={c.value2} placeholder="max" onChange={(e) => setCond(i, { value2: e.target.value })} /></>}
          {f.conditions.length > 1 && <button className="gf-x" onClick={() => delCond(i)}><Icon name="x" size={13} /></button>}
        </div>
      ))}
      <div style={{ display: 'flex', gap: 10, alignItems: 'center', marginTop: 4 }}>
        <Btn sm ghost icon="plus" onClick={addCond}>Add condition</Btn>
        {f.conditions.length > 1 && (
          <div className="seg">
            {['AND', 'OR', 'EITHER'].map((j) => <button key={j} className={f.join === j ? 'on' : ''} onClick={() => upd({ join: j })}>{j}</button>)}
          </div>
        )}
      </div>
      <div className="rb-sec rb-grid2">
        <label className="fld">Lookback window<select value={f.lookback} onChange={(e) => upd({ lookback: e.target.value })}><option value="7">7 days</option><option value="14">14 days</option><option value="30">30 days</option></select></label>
        <label className="rb-check" style={{ alignSelf: 'end', marginBottom: 9 }}><Check on={f.excludeLatest} onClick={() => upd({ excludeLatest: !f.excludeLatest })} /> Exclude latest day</label>
      </div>
      <div className="rb-grid2">
        <label className="fld">Min clicks gate (optional)<input type="number" value={f.minClicks} placeholder="e.g. 15" onChange={(e) => upd({ minClicks: e.target.value })} /></label>
        <label className="fld">Min spend gate (optional)<input type="number" value={f.minSpend} placeholder="e.g. 20" onChange={(e) => upd({ minSpend: e.target.value })} /></label>
      </div>
      <div className="rb-sec">
        <div className="cm-head" style={{ padding: '0 0 8px' }}>THEN — action</div>
        <div className="rb-grid2">
          <label className="fld">Action<select value={f.action} onChange={(e) => upd({ action: e.target.value })}>{RB_ACTIONS.map(([v, l]) => <option key={v} value={v}>{l}</option>)}</select></label>
          {needsVal && <label className="fld">Value<input type="number" autoFocus value={f.actionValue} onChange={(e) => upd({ actionValue: e.target.value })} /></label>}
        </div>
      </div>
      <label className="fld" style={{ marginTop: 12 }}>Run frequency<select value={f.frequency} onChange={(e) => upd({ frequency: e.target.value })}>{RB_FREQ.map((fr) => <option key={fr}>{fr}</option>)}</select></label>
    </Modal>
  )
}

/* ============================ RULE MANAGER ============================ */
function Rules() {
  const [rules, setRules] = useState(() => [...createdStore.get('rules'), ...RULES])
  const [filter, setFilter] = useState('All')
  const [builder, setBuilder] = useState(false)
  const onSave = (rule) => { const next = [rule, ...createdStore.get('rules')]; createdStore.set('rules', next); setRules((rs) => [rule, ...rs]); setBuilder(false); toast(`Rule “${rule.name}” created`) }
  const toggle = (id) => setRules((rs) => rs.map((r) => r.id === id ? { ...r, status: r.status === 'Active' ? 'Paused' : 'Active' } : r))
  const types = ['All', 'Bid', 'Harvest', 'Negative', 'Retail', 'Dayparting', 'Budget']
  const shown = rules.filter((r) => filter === 'All' || r.type === filter)
  const active = rules.filter((r) => r.status === 'Active').length
  const affected = rules.reduce((s, r) => s + r.affected, 0)
  return (
    <>
      <AutoHead title="Rule Manager" sub="Rules-based automation for bids, budgets, harvesting, negatives, dayparting & retail signals"><Btn icon="bulb" ghost>Templates</Btn><Btn icon="plus" primary onClick={() => setBuilder(true)}>Create Rule</Btn></AutoHead>
      <KpiGrid>
        <Kpi label="Active Rules" value={active} />
        <Kpi label="Total Rules" value={rules.length} />
        <Kpi label="Line Items Managed" value={affected.toLocaleString()} />
        <Kpi label="Actions (24h)" value="1,284" />
        <Kpi label="Est. Spend Saved (30d)" value="$8.4K" delta={6.2} />
      </KpiGrid>
      <div className="toolbar">
        {types.map((t) => <span key={t} className={`chip ${filter === t ? 'on' : ''}`} onClick={() => setFilter(t)}>{t}</span>)}
      </div>
      <Card pad={false}>
        {shown.map((r) => (
          <div key={r.id} className="lrow">
            <div className="icobox" style={{ background: RULE_COLOR[r.type] + '1a', color: RULE_COLOR[r.type] }}><Icon name={RULE_ICON[r.type]} size={18} /></div>
            <div className="grow">
              <div className="flex items-center gap-8"><span className="title">{r.name}</span><span className="tag">{r.type}</span></div>
              <div className="desc"><b>IF</b> {r.trigger} · <b>THEN</b> {r.action}</div>
              <div className="desc" style={{ color: 'var(--text-3)' }}>Scope: {r.scope} · Runs {r.runs} · Last run {r.lastRun} · {r.affected} affected</div>
            </div>
            <Pill>{r.status}</Pill>
            <Toggle on={r.status === 'Active'} onClick={() => toggle(r.id)} />
            <Btn sm ghost icon="edit" />
          </div>
        ))}
      </Card>
      <div className="footnote">Rules evaluate on a schedule and auto-apply actions. Combine with Campaign AI for hands-off budget, keyword and bid management.</div>
      {builder && <RuleBuilder onClose={() => setBuilder(false)} onSave={onSave} />}
    </>
  )
}

/* ============================ BUDGET MANAGER ============================ */
function Budgets() {
  const totalCap = budgets.reduce((s, b) => s + b.monthlyCap, 0)
  const totalSpent = budgets.reduce((s, b) => s + b.spent, 0)
  return (
    <>
      <AutoHead title="Budget Manager" sub="Monthly caps, pacing & forecast with auto-pause on cap"><Btn icon="download">Export</Btn><Btn icon="plus" primary>Set Budget Cap</Btn></AutoHead>
      <KpiGrid>
        <Kpi label="Total Monthly Cap" value={money(totalCap)} />
        <Kpi label="Spent MTD" value={money(totalSpent)} />
        <Kpi label="Remaining" value={money(totalCap - totalSpent)} />
        <Kpi label="Forecast EOM" value={money(budgets.reduce((s, b) => s + b.forecast, 0))} />
        <Kpi label="Avg Pace" value={pct(budgets.reduce((s, b) => s + b.pacePct, 0) / budgets.length)} />
      </KpiGrid>
      <div className="hint" style={{ marginBottom: 14 }}>
        <Icon name="wallet" size={16} />
        <div>Upload monthly caps for the fiscal year. When a cap is reached, campaigns auto-pause until the budget refreshes next month. Pacing guard (Rule R7) throttles bids if daily pace runs hot.</div>
      </div>
      <div className="grid-3">
        {budgets.map((b) => (
          <Card key={b.profileId} title={b.profile} sub={`${b.type === '3P' ? 'Seller' : 'Vendor'} · ${b.currency} budget`} actions={<Pill>{b.status}</Pill>}>
            <div style={{ fontSize: 26, fontWeight: 750, letterSpacing: '-.5px' }}>{cur(b.spent, b.currency)}</div>
            <div className="muted" style={{ marginBottom: 12 }}>of {cur(b.monthlyCap, b.currency)} cap</div>
            <div className="pace"><span style={{ width: Math.min(100, (b.spent / b.monthlyCap) * 100) + '%', background: paceColor(b.status) }} /></div>
            <div className="pacelabel"><span>{pct((b.spent / b.monthlyCap) * 100)} of cap</span><span>{pct(b.pacePct)} of target pace</span></div>
            <div style={{ borderTop: '1px solid var(--border)', marginTop: 14, paddingTop: 12, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              <Mini label="Forecast EOM" value={cur(b.forecast, b.currency)} warn={b.forecast > b.monthlyCap} />
              <Mini label="Remaining" value={cur(b.remaining, b.currency)} />
            </div>
          </Card>
        ))}
      </div>
    </>
  )
}
function Mini({ label, value, warn }) {
  return <div><div className="muted" style={{ fontSize: 11 }}>{label}</div><div style={{ fontWeight: 700, color: warn ? 'var(--red)' : 'var(--text)' }}>{value}</div></div>
}
const paceColor = (s) => (s === 'Over pace' ? 'var(--red)' : s === 'Under pace' ? 'var(--amber)' : 'var(--green)')


/* ===================== src/pages/Insights.jsx ===================== */

function InsHead({ title, sub, children }) {
  return <div className="page-head"><div><div className="page-title">{title}</div><div className="page-sub">{sub}</div></div><div className="page-actions">{children}</div></div>
}

/* ============================ REPORT CENTER ============================ */
function Reports() {
  const { sorted } = useSort(reports, { key: 'name', dir: 'asc' })
  const columns = [
    { key: 'name', label: 'Report', sticky: true, width: 280, render: (r) => <div>{r.name}<small>{r.type}</small></div> },
    { key: 'cadence', label: 'Schedule', render: (r) => <span className="tag">{r.cadence}</span> },
    { key: 'format', label: 'Format' },
    { key: 'recipients', label: 'Recipients', num: true, render: (r) => `${r.recipients}` },
    { key: 'owner', label: 'Owner' },
    { key: 'updated', label: 'Updated', render: (r) => <span className="muted">{r.updated}</span> },
    { key: 'act', label: '', render: () => <span style={{ display: 'flex', gap: 6, justifyContent: 'flex-end' }}><Btn sm ghost icon="play">Run</Btn><Btn sm ghost icon="download" /></span> },
  ]
  return (
    <>
      <InsHead title="Report Center" sub="Custom & scheduled reports, dashboards and exports"><Btn icon="file" ghost>Templates</Btn><Btn icon="plus" primary>Build Report</Btn></InsHead>
      <KpiGrid>
        <Kpi label="Saved Reports" value={reports.length} />
        <Kpi label="Scheduled" value={reports.filter(r => /·/.test(r.cadence)).length} />
        <Kpi label="Recipients" value={reports.reduce((s, r) => s + r.recipients, 0)} />
        <Kpi label="Widgets Available" value={reportTemplates.length} />
      </KpiGrid>
      <Card title="Report builder — data sources" sub="Drag widgets onto a custom dashboard" >
        <div className="grid-3">
          {reportTemplates.map((t) => (
            <div key={t} className="lrow" style={{ border: '1px solid var(--border)', borderRadius: 10, padding: 11 }}>
              <div className="icobox" style={{ background: 'var(--brand-soft)', color: 'var(--brand)' }}><Icon name="bars" size={16} /></div>
              <div className="grow"><div className="title" style={{ fontSize: 12.5 }}>{t}</div></div>
              <Icon name="plus" size={15} className="muted" />
            </div>
          ))}
        </div>
      </Card>
      <div style={{ height: 16 }} />
      <DataTable columns={columns} rows={sorted} />
    </>
  )
}

/* ============================ ALERTS ============================ */
function Alerts() {
  const [alerts, setAlerts] = useState(ALERTS)
  const [filter, setFilter] = useState('All')
  const markRead = (id) => setAlerts((a) => a.map((x) => x.id === id ? { ...x, read: true } : x))
  const markAll = () => setAlerts((a) => a.map((x) => ({ ...x, read: true })))
  const sevTone = { high: 'red', med: 'amber', low: 'gray' }
  const shown = alerts.filter((a) => filter === 'All' || (filter === 'Unread' ? !a.read : a.sev === filter.toLowerCase()))
  return (
    <>
      <InsHead title="Alerts" sub="Real-time notifications across ads, budget & retail signals"><Btn icon="check" ghost onClick={markAll}>Mark all read</Btn><Btn icon="gear" primary>Alert Settings</Btn></InsHead>
      <KpiGrid>
        <Kpi label="Unread" value={alerts.filter(a => !a.read).length} />
        <Kpi label="High Severity" value={alerts.filter(a => a.sev === 'high').length} />
        <Kpi label="Today" value={alerts.length} />
      </KpiGrid>
      <div className="toolbar">
        {['All', 'Unread', 'High', 'Med', 'Low'].map((t) => <span key={t} className={`chip ${filter === t ? 'on' : ''}`} onClick={() => setFilter(t)}>{t}</span>)}
      </div>
      <Card pad={false}>
        {shown.map((a) => (
          <div key={a.id} className="lrow" style={{ background: a.read ? 'transparent' : 'var(--brand-soft)' }}>
            <div className="icobox" style={{ background: insSevBg(a.sev), color: insSevColor(a.sev) }}><Icon name={a.icon} size={18} /></div>
            <div className="grow">
              <div className="flex items-center gap-8"><span className="title">{a.title}</span><Pill tone={sevTone[a.sev]}>{a.sev}</Pill></div>
              <div className="desc">{a.body}</div>
            </div>
            <div className="muted" style={{ fontSize: 11, whiteSpace: 'nowrap' }}>{a.time}</div>
            {!a.read && <Btn sm ghost icon="check" onClick={() => markRead(a.id)} />}
          </div>
        ))}
        {shown.length === 0 && <div className="empty">No alerts match this filter</div>}
      </Card>
    </>
  )
}
const insSevBg = (s) => ({ high: 'var(--red-soft)', med: 'var(--amber-soft)', low: '#eef1f6' }[s])
const insSevColor = (s) => ({ high: 'var(--red)', med: 'var(--amber)', low: 'var(--text-2)' }[s])

/* ============================ SETTINGS ============================ */

        <Card title="Connected data sources" sub="Advertising & retail integrations" pad={false}>
          {conns.map((c) => (
            <div key={c.name} className="lrow">
              <div className="icobox" style={{ background: 'var(--surface-2)', color: 'var(--text-2)' }}><Icon name={c.icon} size={17} /></div>

            {[['JL', 'Jim Laframboise', 'Owner'], ['AR', 'A. Rivera', 'Analyst'], ['MC', 'M. Chen', 'Manager']].map(([i, n, role]) => (
              <div key={n} className="lrow" style={{ padding: '9px 0' }}>
