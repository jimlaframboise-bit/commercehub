<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CommerceHub — Retail Media Platform</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231a4fd6'/%3E%3Ctext x='16' y='22' font-size='18' font-family='Arial' font-weight='bold' fill='white' text-anchor='middle'%3EC%3C/text%3E%3C/svg%3E" />
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
<style>
:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface-2: #f7f9fc;
  --border: #e6e9ef;
  --border-strong: #d4d9e2;
  --text: #1f2430;
  --text-2: #5b6577;
  --text-3: #8a94a6;
  --brand: #1a4fd6;
  --brand-2: #1a73e8;
  --brand-soft: #eaf1ff;
  --navy: #11203f;
  --green: #1aa260;
  --green-soft: #e6f6ee;
  --red: #d93838;
  --red-soft: #fdecec;
  --amber: #d98a00;
  --amber-soft: #fdf3e0;
  --purple: #6b3fd6;
  --purple-soft: #efeaff;
  --shadow: 0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.06);
  --shadow-lg: 0 8px 28px rgba(16,24,40,.12);
  --radius: 12px;
  --radius-sm: 8px;
  --header-h: 56px;
  --sidebar-w: 232px;
  font-synthesis: none;
  text-rendering: optimizeLegibility;
}

* { box-sizing: border-box; }
html, body, #root { height: 100%; }
body {
  margin: 0;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: #cfd5e0; border-radius: 6px; border: 2px solid var(--bg); }
::-webkit-scrollbar-track { background: transparent; }

/* ---------- App shell ---------- */
.app { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar {
  width: var(--sidebar-w);
  background: var(--navy);
  color: #c8d2e4;
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; bottom: 0; left: 0;
  z-index: 30;
}
.sidebar-brand {
  height: var(--header-h);
  display: flex; align-items: center; gap: 10px;
  padding: 0 18px;
  color: #fff;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.brand-logo {
  width: 28px; height: 28px; border-radius: 7px;
  background: linear-gradient(135deg, var(--brand-2), var(--brand));
  display: grid; place-items: center;
  font-weight: 800; color: #fff; font-size: 15px;
  flex: 0 0 auto;
}
.brand-name { font-weight: 700; font-size: 15px; letter-spacing: -.2px; }
.brand-name span { color: #7fa6ff; }

.module-switch { padding: 14px 12px 6px; }
.module-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: #6b7a96; padding: 0 8px 6px; }
.module-pill {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 10px; border-radius: var(--radius-sm);
  color: #aeb9cf; font-weight: 600; font-size: 12.5px;
  cursor: pointer; margin-bottom: 2px;
}
.module-pill:hover { background: rgba(255,255,255,.05); color: #fff; }
.module-pill.active { background: var(--brand); color: #fff; }
.module-pill .ico { width: 17px; height: 17px; flex: 0 0 auto; }

.nav-section { padding: 8px 12px; overflow-y: auto; flex: 1; }
.nav-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: #6b7a96; padding: 12px 10px 6px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: var(--radius-sm);
  color: #b6c0d6; font-size: 12.5px; cursor: pointer; margin-bottom: 1px;
}
.nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }
.nav-item.active { background: rgba(127,166,255,.16); color: #fff; font-weight: 600; }
.nav-item .ico { width: 16px; height: 16px; flex: 0 0 auto; opacity: .9; }
.nav-badge { margin-left: auto; font-size: 10px; background: rgba(255,255,255,.12); padding: 1px 6px; border-radius: 10px; }

.sidebar-foot { padding: 12px; border-top: 1px solid rgba(255,255,255,.08); display: flex; align-items: center; gap: 10px; }
.avatar { width: 30px; height: 30px; border-radius: 50%; background: #3a5a9e; color:#fff; display: grid; place-items: center; font-weight: 700; font-size: 12px; }
.sidebar-foot .who { font-size: 12px; color: #e6ecf7; font-weight: 600; }
.sidebar-foot .who small { display: block; color: #8595b3; font-weight: 500; font-size: 10.5px; }

/* Main */
.main { flex: 1; margin-left: var(--sidebar-w); display: flex; flex-direction: column; min-width: 0; }
.topbar {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px;
  padding: 0 22px; position: sticky; top: 0; z-index: 20;
}
.crumb { display:flex; align-items:center; gap: 8px; color: var(--text-3); font-size: 12.5px; }
.crumb b { color: var(--text); font-weight: 700; font-size: 14px; }
.crumb .sep { color: var(--border-strong); }
.topbar-spacer { flex: 1; }
.topbar-ctrl {
  display:flex; align-items:center; gap: 7px; height: 32px; padding: 0 11px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text-2); font-size: 12px; font-weight: 500;
}
.topbar-ctrl:hover { border-color: var(--border-strong); color: var(--text); }
.topbar-ctrl .ico { width: 15px; height: 15px; }
.topbar-ctrl .badge { background: var(--brand); color: #fff; border-radius: 9px; font-size: 10px; padding: 0 5px; font-weight:700;}

.content { padding: 20px 22px 60px; flex: 1; }
.page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 16px; gap: 16px; flex-wrap: wrap; }
.page-title { font-size: 19px; font-weight: 750; letter-spacing: -.3px; }
.page-sub { color: var(--text-2); margin-top: 2px; font-size: 12.5px; }
.page-actions { display: flex; gap: 8px; align-items: center; }

/* Buttons */
.btn { display:inline-flex; align-items:center; gap:7px; height: 32px; padding: 0 13px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--surface); color: var(--text); font-size: 12.5px; font-weight: 600; }
.btn:hover { background: var(--surface-2); }
.btn.primary { background: var(--brand); border-color: var(--brand); color: #fff; }
.btn.primary:hover { background: #1644bd; }
.btn.ghost { border-color: transparent; background: transparent; color: var(--text-2); }
.btn.ghost:hover { background: var(--surface-2); color: var(--text); }
.btn .ico { width: 15px; height: 15px; }
.btn.sm { height: 27px; padding: 0 10px; font-size: 11.5px; }

/* Tabs (view selector) */
.viewtabs { display: flex; gap: 2px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; margin-bottom: 16px; overflow-x: auto; }
.viewtab { padding: 7px 13px; border-radius: 7px; font-size: 12.5px; font-weight: 600; color: var(--text-2); white-space: nowrap; }
.viewtab:hover { background: var(--surface-2); color: var(--text); }
.viewtab.active { background: var(--brand-soft); color: var(--brand); }

/* KPI cards */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 18px; }
.kpi {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 13px 15px; box-shadow: var(--shadow); position: relative;
}
.kpi .k-label { color: var(--text-2); font-size: 11.5px; font-weight: 600; display:flex; align-items:center; gap:6px;}
.kpi .k-val { font-size: 22px; font-weight: 750; letter-spacing: -.5px; margin-top: 5px; }
.kpi .k-delta { font-size: 11px; font-weight: 700; margin-top: 4px; display: inline-flex; align-items: center; gap: 3px; }
.k-delta.up { color: var(--green); }
.k-delta.down { color: var(--red); }
.kpi .k-spark { position:absolute; right:12px; bottom:10px; opacity:.85; }

/* Card / panel */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
.card-head { display:flex; align-items:center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); }
.card-head h3 { margin: 0; font-size: 14px; font-weight: 700; }
.card-head .sub { color: var(--text-2); font-size: 12px; font-weight: 500; }
.card-body { padding: 16px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
@media (max-width: 1100px){ .grid-2,.grid-3 { grid-template-columns: 1fr; } }

/* Toolbar above tables */
.toolbar { display:flex; align-items:center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
.search {
  display:flex; align-items:center; gap: 8px; height: 34px; padding: 0 12px; flex: 1; min-width: 220px; max-width: 380px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-3);
}
.search input { border: none; outline: none; background: transparent; font-size: 12.5px; color: var(--text); width: 100%; }
.chip { display:inline-flex; align-items:center; gap:6px; height: 28px; padding: 0 10px; border-radius: 16px; background: var(--surface); border: 1px solid var(--border); color: var(--text-2); font-size: 11.5px; font-weight: 600;}
.chip.on { background: var(--brand-soft); border-color: #cdddff; color: var(--brand); }
.bulkbar { display:flex; align-items:center; gap: 10px; background: var(--navy); color:#fff; border-radius: var(--radius-sm); padding: 8px 14px; margin-bottom: 12px; }
.bulkbar .sel { font-weight: 700; }
.bulkbar .btn { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.18); color:#fff; }
.bulkbar .btn:hover { background: rgba(255,255,255,.2); }

/* Table */
.tablewrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); box-shadow: var(--shadow); }
table.dt { border-collapse: collapse; width: 100%; font-size: 12.5px; min-width: 100%; }
table.dt th, table.dt td { padding: 10px 12px; text-align: left; white-space: nowrap; }
table.dt thead th {
  background: var(--surface-2); color: var(--text-2); font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .03em;
  border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 2;
}
table.dt th.num, table.dt td.num { text-align: right; font-variant-numeric: tabular-nums; }
table.dt tbody tr { border-bottom: 1px solid var(--border); }
table.dt tbody tr:hover { background: var(--surface-2); }
table.dt tbody tr:last-child { border-bottom: none; }
.cellname { font-weight: 600; color: var(--text); max-width: 360px; white-space: normal; }
.cellname small { display:block; color: var(--text-3); font-weight: 500; }
.sticky-l { position: sticky; left: 0; background: var(--surface); z-index: 1; }
table.dt tbody tr:hover .sticky-l { background: var(--surface-2); }
thead .sticky-l { z-index: 3; background: var(--surface-2); }

/* Status pills */
.pill { display:inline-flex; align-items:center; gap:6px; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.pill .dot { width:7px; height:7px; border-radius:50%; }
.pill.green { background: var(--green-soft); color: #0f7a47; }
.pill.green .dot { background: var(--green); }
.pill.red { background: var(--red-soft); color: var(--red); }
.pill.red .dot { background: var(--red); }
.pill.amber { background: var(--amber-soft); color: #9a6300; }
.pill.amber .dot { background: var(--amber); }
.pill.gray { background: #eef1f6; color: var(--text-2); }
.pill.gray .dot { background: var(--text-3); }
.pill.blue { background: var(--brand-soft); color: var(--brand); }
.pill.blue .dot { background: var(--brand); }
.pill.purple { background: var(--purple-soft); color: var(--purple); }
.pill.purple .dot { background: var(--purple); }

.tag { display:inline-block; padding: 1px 7px; border-radius: 5px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text-2); font-size: 11px; font-weight: 600; }

/* Toggle */
.toggle { width: 34px; height: 19px; border-radius: 20px; background: #c9d0dc; position: relative; transition: .15s; border:none; padding:0; flex:0 0 auto;}
.toggle.on { background: var(--green); }
.toggle::after { content:''; position:absolute; top:2px; left:2px; width: 15px; height:15px; border-radius:50%; background:#fff; transition:.15s; box-shadow: 0 1px 2px rgba(0,0,0,.2);}
.toggle.on::after { left: 17px; }

.bidcell { display:flex; align-items:center; gap:6px; }
.bidcell .ed { color: var(--brand); font-weight:700; }
.miniprog { width: 70px; height: 6px; background: #eef1f6; border-radius: 4px; overflow: hidden; }
.miniprog > span { display:block; height: 100%; background: var(--brand); }

/* Checkboxes */
.cb { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border-strong); display:inline-grid; place-items:center; cursor:pointer; background:#fff;}
.cb.on { background: var(--brand); border-color: var(--brand); color:#fff; }

/* Misc */
.muted { color: var(--text-2); }
.flex { display:flex; }
.between { justify-content: space-between; }
.items-center { align-items: center; }
.gap-8 { gap: 8px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; }
.mt-8{margin-top:8px;} .mt-16{margin-top:16px;} .mb-12{margin-bottom:12px;}
.right { text-align: right; }
.legend { display:flex; gap: 14px; flex-wrap: wrap; }
.legend span { display:inline-flex; align-items:center; gap:6px; font-size:12px; color: var(--text-2); }
.legend i { width:10px;height:10px;border-radius:3px;display:inline-block;}
.section-title { font-size: 13px; font-weight: 750; margin: 4px 0 12px; color: var(--text); }
.hint { background: var(--brand-soft); border: 1px solid #d4e3ff; color: #234; border-radius: var(--radius-sm); padding: 10px 13px; font-size: 12px; display:flex; gap:10px; align-items:flex-start; }
.hint .ico { color: var(--brand); flex:0 0 auto; margin-top:1px;}

/* Rule / list rows */
.lrow { display:flex; align-items:center; gap: 14px; padding: 13px 16px; border-bottom: 1px solid var(--border); }
.lrow:last-child { border-bottom:none; }
.lrow:hover { background: var(--surface-2); }
.lrow .icobox { width:36px;height:36px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto;}
.lrow .grow { flex:1; min-width:0; }
.lrow .title { font-weight: 650; }
.lrow .desc { color: var(--text-2); font-size: 11.5px; margin-top:2px; }

/* Dayparting heatmap */
.heat { display:grid; grid-template-columns: 42px repeat(24, 1fr); gap: 3px; }
.heat .hh { font-size: 9.5px; color: var(--text-3); text-align:center; }
.heat .rl { font-size: 11px; color: var(--text-2); display:flex; align-items:center; font-weight:600;}
.heat .cell { height: 22px; border-radius: 4px; display:grid; place-items:center; font-size:9px; color: rgba(255,255,255,.95); cursor:pointer;}

/* Progress bars in budget */
.pace { height: 9px; border-radius: 6px; background: #eef1f6; overflow: hidden; position: relative; }
.pace > span { display:block; height:100%; border-radius:6px; }
.pacelabel { display:flex; justify-content: space-between; font-size: 11px; color: var(--text-2); margin-top:5px; }

/* small donut */
.metric-inline { display:flex; align-items:center; gap: 8px; }

.footnote { color: var(--text-3); font-size: 11px; margin-top: 10px; }
.empty { padding: 40px; text-align:center; color: var(--text-3); }

#boot { position:fixed; inset:0; display:grid; place-items:center; font-family:sans-serif; color:#5b6577; }
</style>
</head>

      const area = line + ' L' + X(data.length - 1) + ' ' + Y(min) + ' L' + X(0) + ' ' + Y(min) + ' Z';
      return <g key={'s' + si}>
        {kind === 'area' && <path d={area} fill={color} fillOpacity="0.14" />}
        <path d={line} fill="none" stroke={color} strokeWidth="2" />
      </g>;
    })}
  </svg>;
}
function _bars(series, data, X, Y, iw, min) {
  const n = Math.max(1, series.length); const band = iw / Math.max(1, data.length);
  const bw = Math.min(30, band * 0.66); const sub = bw / n;
  const out = [];
  data.forEach((d, i) => series.forEach((s, si) => {
    const v = +d[s.dataKey] || 0; const x0 = X(i) - bw / 2 + si * sub; const y0 = Y(v); const h = Y(min) - y0;
    out.push(<rect key={i + '-' + si} x={x0} y={y0} width={Math.max(2, sub - 2)} height={Math.max(0, h)} rx="2" fill={s.fill || '#1a4fd6'} />);
  }));
  return out;
}
function _legend(children) {
  const s = _series(children, ['area', 'line', 'bar']); if (!s.length) return null;
  return <div style={{ display: 'flex', gap: 14, justifyContent: 'center', marginTop: 4, flexWrap: 'wrap' }}>
    {s.map((x, i) => <span key={i} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 12, color: '#5b6577' }}>
      <i style={{ width: 10, height: 10, borderRadius: 2, background: x.fill || x.stroke || '#1a4fd6', display: 'inline-block' }} />{x.name || x.dataKey}
    </span>)}
  </div>;
}
function _Chart(props, kind) {
  const hasLeg = !!_find(props.children, 'legend'); const h = (props.__h || 260) - (hasLeg ? 20 : 0);
  return <div>{_chart({ ...props, __h: h }, kind)}{hasLeg ? _legend(props.children) : null}</div>;
}
function AreaChart(p) { return _Chart(p, 'area'); }
function LineChart(p) { return _Chart(p, 'line'); }
function BarChart(p) { return _Chart(p, 'bar'); }

// Number / currency / percent formatting helpers

const cur = (n, symbol = '$', dec = 0) => {
  if (n == null || isNaN(n)) return '—'
  const neg = n < 0
  const v = Math.abs(n)
  const s = v.toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec })
  return `${neg ? '-' : ''}${symbol}${s}`
}

const compact = (n, symbol = '') => {
  if (n == null || isNaN(n)) return '—'
  const abs = Math.abs(n)
  let out
  if (abs >= 1e9) out = (n / 1e9).toFixed(1).replace(/\.0$/, '') + 'B'
  else if (abs >= 1e6) out = (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M'
  else if (abs >= 1e3) out = (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'K'
  else out = Math.round(n).toLocaleString('en-US')
  return symbol + out
}

const money = (n, symbol = '$') => {
  if (n == null || isNaN(n)) return '—'
  const abs = Math.abs(n)
  if (abs >= 1e6) return `${symbol}${(n / 1e6).toFixed(2)}M`
  if (abs >= 1e4) return `${symbol}${(n / 1e3).toFixed(1)}K`
  return `${symbol}${n.toLocaleString('en-US', { maximumFractionDigits: 0 })}`
}

const pct = (n, dec = 1) => (n == null || isNaN(n) ? '—' : `${n.toFixed(dec)}%`)
const dec2 = (n) => (n == null || isNaN(n) ? '—' : n.toFixed(2))
const int = (n) => (n == null || isNaN(n) ? '—' : Math.round(n).toLocaleString('en-US'))

    const sales = Math.round(orders * range(15, 22))
    out.push({
      date: `${d.getMonth() + 1}/${d.getDate()}`,
      impr, clicks, spend, orders, sales,
      acos: +((spend / sales) * 100).toFixed(1),
      roas: +(sales / spend).toFixed(2),
    })
  }
  return out
})()

// ---------------------------------------------------------------------------
// Aggregations / KPI helpers
// ---------------------------------------------------------------------------
function aggregate(rows) {
  const sum = (k) => rows.reduce((a, b) => a + (b[k] || 0), 0)
  const impr = sum('impr'), clk = sum('clk'), spend = sum('spend'),
    sales = sum('sales'), orders = sum('orders'), units = sum('units')
  return {
    impr, clk, spend, sales, orders, units,
    ctr: (clk / impr) * 100,
    cpc: spend / clk,
    acos: (spend / sales) * 100,
    roas: sales / spend,
    cvr: (orders / clk) * 100,
    cpa: spend / orders,
    aov: sales / orders,
  }
}

function campaignsFor(profileId) {
  return profileId === 'all' ? campaigns : campaigns.filter((c) => c.profileId === profileId)
}

/* ---------------- DataTable ----------------
   columns: [{ key, label, num?, sticky?, render?(row), width? }]
*/
function DataTable({ columns, rows, selectable, selected, onToggle, onToggleAll, rowKey = 'id', empty = 'No data' }) {
  const allOn = selectable && rows.length > 0 && rows.every((r) => selected?.has(r[rowKey]))
  return (
    <div className="tablewrap">
      <table className="dt">
        <thead>
          <tr>
            {selectable && (
              <th className="sticky-l" style={{ width: 36 }}>
                <Check on={allOn} onClick={onToggleAll} />
              </th>
            )}
            {columns.map((c) => (
              <th key={c.key} className={`${c.num ? 'num' : ''} ${c.sticky ? 'sticky-l' : ''}`} style={c.width ? { minWidth: c.width } : undefined}>{c.label}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.length === 0 && <tr><td colSpan={columns.length + (selectable ? 1 : 0)} className="empty">{empty}</td></tr>}
          {rows.map((r) => (
            <tr key={r[rowKey]}>
              {selectable && (
                <td className="sticky-l"><Check on={selected?.has(r[rowKey])} onClick={() => onToggle(r[rowKey])} /></td>
              )}
              {columns.map((c) => (
                <td key={c.key} className={`${c.num ? 'num' : ''} ${c.sticky ? 'sticky-l cellname' : ''}`}>
                  {c.render ? c.render(r) : r[c.key]}
                </td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  )
}

/* sorting hook for tables */
function useSort(rows, initial) {
  const [sort, setSort] = useState(initial || { key: null, dir: 'desc' })
  const sorted = useMemo(() => {
    if (!sort.key) return rows
    const r = [...rows].sort((a, b) => {
      const x = a[sort.key], y = b[sort.key]
      if (typeof x === 'number') return sort.dir === 'asc' ? x - y : y - x
      return sort.dir === 'asc' ? String(x).localeCompare(String(y)) : String(y).localeCompare(String(x))
    })
    return r
  }, [rows, sort])
  const toggle = (key) => setSort((s) => ({ key, dir: s.key === key && s.dir === 'desc' ? 'asc' : 'desc' }))
  return { sorted, sort, toggle }
}

/* ============================ CAMPAIGNS ============================ */
function Campaigns() {
  const base = useProfileFilter(ALL_CAMPAIGNS)
  const [overrides, setOverrides] = useState({})
  const [q, setQ] = useState('')
  const [typeFilter, setTypeFilter] = useState('All')
  const [sel, setSel] = useState(new Set())

  const data = base.map((c) => (overrides[c.id] ? { ...c, ...overrides[c.id] } : c))
  const types = ['All', 'SP-Auto', 'SP-Manual', 'SB', 'SBV', 'SD-Product', 'SD-Audience']
  const filtered = data.filter((c) =>
    (typeFilter === 'All' || c.campaignType === typeFilter) &&
    c.name.toLowerCase().includes(q.toLowerCase()))
  const { sorted, sort, toggle } = useSort(filtered, { key: 'spend', dir: 'desc' })

  const ov = (st) => ({ state: st, status: st === 'Paused' ? 'Paused' : 'Enabled' })
  const setState = (id, st) => setOverrides((o) => ({ ...o, [id]: ov(st) }))
  const bulkState = (st) => { setOverrides((o) => { const n = { ...o }; sel.forEach((id) => { n[id] = ov(st) }); return n }); setSel(new Set()) }
  const toggleSel = (id) => setSel((s) => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n })
  const toggleAll = () => setSel((s) => s.size === sorted.length ? new Set() : new Set(sorted.map((r) => r.id)))

  const SH = ({ k, children, num }) => (
    <span onClick={() => toggle(k)} style={{ cursor: 'pointer', userSelect: 'none' }}>
      {children}{sort.key === k && <Icon name={sort.dir === 'asc' ? 'arrowUp' : 'arrowDown'} size={11} style={{ marginLeft: 3, verticalAlign: 'middle' }} />}
    </span>
  )

  const columns = [
    { key: 'name', label: <SH k="name">Campaign</SH>, sticky: true, width: 320, render: (r) => (
      <div><div>{r.name}</div><small>{r.profileId.toUpperCase()} · {r.product?.split('—')[0]}</small></div>) },
    { key: 'state', label: 'State', render: (r) => <Toggle on={r.state === 'Enabled'} onClick={() => setState(r.id, r.state === 'Enabled' ? 'Paused' : 'Enabled')} /> },
    { key: 'status', label: 'Status', render: (r) => <Pill>{r.status}</Pill> },
    { key: 'campaignType', label: 'Type', render: (r) => <span className={`pill ${typeTone(r.campaignType)}`} style={{ borderRadius: 5 }}>{r.campaignType}</span> },
    { key: 'adGroups', label: 'Ad Groups', num: true, render: (r) => <span className="muted">{r.adGroups.active}/{r.adGroups.total}</span> },
    { key: 'dailyBudget', label: <SH k="dailyBudget">Daily Budget</SH>, num: true, render: (r) => (
      <span className="bidcell" style={{ justifyContent: 'flex-end' }}>{cur(r.dailyBudget, symA(r.profileId), 0)}<Icon name="edit" size={12} className="ed" /></span>) },
    { key: 'bid', label: 'Bid (Act/Avl)', num: true, render: (r) => <span className="muted">{r.actlBid} / {r.avlBid}</span> },
    { key: 'impr', label: <SH k="impr">Impr.</SH>, num: true, render: (r) => compact(r.impr) },
    { key: 'clk', label: <SH k="clk">Clicks</SH>, num: true, render: (r) => int(r.clk) },
    { key: 'ctr', label: 'CTR', num: true, render: (r) => pct(r.ctr, 2) },
    { key: 'spend', label: <SH k="spend">Spend</SH>, num: true, render: (r) => cur(r.spend, symA(r.profileId)) },
    { key: 'cpc', label: 'CPC', num: true, render: (r) => cur(r.cpc, symA(r.profileId), 2) },
    { key: 'sales', label: <SH k="sales">Sales</SH>, num: true, render: (r) => cur(r.sales, symA(r.profileId)) },
    { key: 'orders', label: <SH k="orders">Orders</SH>, num: true, render: (r) => int(r.orders) },
    { key: 'cvr', label: 'CVR', num: true, render: (r) => pct(r.cvr) },
    { key: 'acos', label: <SH k="acos">ACoS</SH>, num: true, render: (r) => <span style={{ color: r.acos > 40 ? 'var(--red)' : r.acos < 25 ? 'var(--green)' : 'inherit', fontWeight: 600 }}>{pct(r.acos)}</span> },
    { key: 'roas', label: 'ROAS', num: true, render: (r) => dec2(r.roas) },
    { key: 'ntb', label: 'NTB Orders', num: true, render: (r) => int(r.ntb) },
  ]

  return (
    <>
      <AdsHead title="Campaigns" sub={`${filtered.length} campaigns · Sponsored Products, Brands & Display`}>
        <Btn icon="sliders" ghost>Columns</Btn>
        <Btn icon="download">Export</Btn>
        <Btn icon="plus" primary>Create Campaign</Btn>
      </AdsHead>
      <KpiRow rows={filtered} />

      <div className="toolbar">
        <SearchBox value={q} onChange={setQ} placeholder="Search campaigns…" />
        {types.map((t) => (
          <span key={t} className={`chip ${typeFilter === t ? 'on' : ''}`} onClick={() => setTypeFilter(t)}>{t}</span>
        ))}
        <div style={{ flex: 1 }} />
        <Btn sm ghost icon="filter">More filters</Btn>
      </div>

      {sel.size > 0 && (
        <div className="bulkbar">
          <span className="sel">{sel.size} selected</span>
          <Btn sm icon="play" onClick={() => bulkState('Enabled')}>Enable</Btn>
          <Btn sm icon="pause" onClick={() => bulkState('Paused')}>Pause</Btn>
          <Btn sm icon="target">Adjust Bids</Btn>
          <Btn sm icon="wallet">Adjust Budget</Btn>
          <Btn sm icon="clock">Dayparting</Btn>
          <Btn sm icon="sliders">Apply Rule</Btn>
          <Btn sm icon="tag">Tag</Btn>
          <div style={{ flex: 1 }} />
          <Btn sm ghost onClick={() => setSel(new Set())}>Clear</Btn>
        </div>
      )}

      <DataTable columns={columns} rows={sorted} selectable selected={sel} onToggle={toggleSel} onToggleAll={toggleAll} />
      <div className="footnote">Bulk operations apply across selected line items — bids, budgets, dayparting, rules, negatives and tags. Bid shown as Actual / Available (suggested ceiling).</div>
    </>
  )
}

/* ============================ DAYPARTING ============================ */
function Dayparting() {
  const [grid] = useState(dayparting)
  const hours = Array.from({ length: 24 }, (_, h) => h)
  const color = (v) => {
    // v ~0.4 to 1.5 → light to dark blue
    const t = Math.max(0, Math.min(1, (v - 0.4) / 1.1))
    const r = Math.round(234 - t * (234 - 26))
    const g = Math.round(241 - t * (241 - 79))
    const b = Math.round(255 - t * (255 - 214))
    return `rgb(${r},${g},${b})`
  }
  return (
    <>
      <AdsHead title="Dayparting" sub="Hour-of-day & day-of-week bid multipliers"><Btn icon="refresh" ghost>Reset</Btn><Btn icon="bulb">Suggest Schedule</Btn><Btn icon="check" primary>Apply to Campaigns</Btn></AdsHead>
      <div className="hint" style={{ marginBottom: 14 }}>
        <Icon name="bulb" size={16} />
        <div>Multipliers scale bids up during high-converting hours and down during low-traffic windows. Darker = higher multiplier. Apply to selected campaigns or portfolios.</div>
      </div>
      <Card title="Bid multiplier schedule" sub="Local account time · 168 hourly slots">
        <div style={{ overflowX: 'auto' }}>
          <div className="heat" style={{ minWidth: 760 }}>
            <div />
            {hours.map((h) => <div key={h} className="hh">{h}</div>)}
            {grid.map((row, di) => (
              <Row key={di} day={DAYS[di]} row={row} color={color} />
            ))}
          </div>
        </div>
        <div className="legend" style={{ marginTop: 16, justifyContent: 'center' }}>
          <span><i style={{ background: color(0.4) }} /> 0.4× (overnight)</span>
          <span><i style={{ background: color(0.8) }} /> 0.8×</span>
          <span><i style={{ background: color(1.1) }} /> 1.1×</span>
          <span><i style={{ background: color(1.45) }} /> 1.45× (peak)</span>
        </div>
      </Card>
      <div className="footnote">For shopping events (e.g. Prime Day) apply an event-window override via Rule R6 to boost peak hours automatically.</div>
    </>
  )
}

}
const RULE_ICON = { Bid: 'target', Harvest: 'spark', Negative: 'x', Retail: 'shield', Dayparting: 'clock', Budget: 'wallet' }
const RULE_COLOR = { Bid: 'var(--brand)', Harvest: 'var(--green)', Negative: 'var(--red)', Retail: 'var(--purple)', Dayparting: 'var(--amber)', Budget: 'var(--brand-2)' }

/* ============================ RULE MANAGER ============================ */
function Rules() {
  const [rules, setRules] = useState(RULES)
  const [filter, setFilter] = useState('All')
  const toggle = (id) => setRules((rs) => rs.map((r) => r.id === id ? { ...r, status: r.status === 'Active' ? 'Paused' : 'Active' } : r))
  const types = ['All', 'Bid', 'Harvest', 'Negative', 'Retail', 'Dayparting', 'Budget']
  const shown = rules.filter((r) => filter === 'All' || r.type === filter)
  const active = rules.filter((r) => r.status === 'Active').length
  const affected = rules.reduce((s, r) => s + r.affected, 0)
  return (
    <>
      <AutoHead title="Rule Manager" sub="Rules-based automation for bids, budgets, harvesting, negatives, dayparting & retail signals"><Btn icon="bulb" ghost>Templates</Btn><Btn icon="plus" primary>Create Rule</Btn></AutoHead>
      <KpiGrid>
        <Kpi label="Active Rules" value={active} />
        <Kpi label="Total Rules" value={rules.length} />
        <Kpi label="Line Items Managed" value={affected.toLocaleString()} />
        <Kpi label="Actions (24h)" value="1,284" />
        <Kpi label="Est. Spend Saved (30d)" value="$8.4K" delta={6.2} />
      </KpiGrid>
      <div className="toolbar">
        {types.map((t) => <span key={t} className={`chip ${filter === t ? 'on' : ''}`} onClick={() => setFilter(t)}>{t}</span>)}
      </div>
      <Card pad={false}>
        {shown.map((r) => (
          <div key={r.id} className="lrow">
            <div className="icobox" style={{ background: RULE_COLOR[r.type] + '1a', color: RULE_COLOR[r.type] }}><Icon name={RULE_ICON[r.type]} size={18} /></div>
            <div className="grow">
              <div className="flex items-center gap-8"><span className="title">{r.name}</span><span className="tag">{r.type}</span></div>
              <div className="desc"><b>IF</b> {r.trigger} · <b>THEN</b> {r.action}</div>
              <div className="desc" style={{ color: 'var(--text-3)' }}>Scope: {r.scope} · Runs {r.runs} · Last run {r.lastRun} · {r.affected} affected</div>
            </div>
            <Pill>{r.status}</Pill>
            <Toggle on={r.status === 'Active'} onClick={() => toggle(r.id)} />
            <Btn sm ghost icon="edit" />
          </div>
        ))}
      </Card>
      <div className="footnote">Rules evaluate on a schedule and auto-apply actions. Combine with Campaign AI for hands-off budget, keyword and bid management.</div>
    </>
  )
}

/* ============================ BUDGET MANAGER ============================ */
function Budgets() {
  const totalCap = budgets.reduce((s, b) => s + b.monthlyCap, 0)
  const totalSpent = budgets.reduce((s, b) => s + b.spent, 0)
  return (
    <>
      <AutoHead title="Budget Manager" sub="Monthly caps, pacing & forecast with auto-pause on cap"><Btn icon="download">Export</Btn><Btn icon="plus" primary>Set Budget Cap</Btn></AutoHead>
      <KpiGrid>
        <Kpi label="Total Monthly Cap" value={money(totalCap)} />
        <Kpi label="Spent MTD" value={money(totalSpent)} />
        <Kpi label="Remaining" value={money(totalCap - totalSpent)} />
        <Kpi label="Forecast EOM" value={money(budgets.reduce((s, b) => s + b.forecast, 0))} />
        <Kpi label="Avg Pace" value={pct(budgets.reduce((s, b) => s + b.pacePct, 0) / budgets.length)} />
      </KpiGrid>
      <div className="hint" style={{ marginBottom: 14 }}>
        <Icon name="wallet" size={16} />
        <div>Upload monthly caps for the fiscal year. When a cap is reached, campaigns auto-pause until the budget refreshes next month. Pacing guard (Rule R7) throttles bids if daily pace runs hot.</div>
      </div>
      <div className="grid-3">
        {budgets.map((b) => (
          <Card key={b.profileId} title={b.profile} sub={`${b.type === '3P' ? 'Seller' : 'Vendor'} · ${b.currency} budget`} actions={<Pill>{b.status}</Pill>}>
            <div style={{ fontSize: 26, fontWeight: 750, letterSpacing: '-.5px' }}>{cur(b.spent, b.currency)}</div>
            <div className="muted" style={{ marginBottom: 12 }}>of {cur(b.monthlyCap, b.currency)} cap</div>
            <div className="pace"><span style={{ width: Math.min(100, (b.spent / b.monthlyCap) * 100) + '%', background: paceColor(b.status) }} /></div>
            <div className="pacelabel"><span>{pct((b.spent / b.monthlyCap) * 100)} of cap</span><span>{pct(b.pacePct)} of target pace</span></div>
            <div style={{ borderTop: '1px solid var(--border)', marginTop: 14, paddingTop: 12, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              <Mini label="Forecast EOM" value={cur(b.forecast, b.currency)} warn={b.forecast > b.monthlyCap} />
              <Mini label="Remaining" value={cur(b.remaining, b.currency)} />
            </div>
          </Card>
        ))}
      </div>
    </>
  )
}
function Mini({ label, value, warn }) {
  return <div><div className="muted" style={{ fontSize: 11 }}>{label}</div><div style={{ fontWeight: 700, color: warn ? 'var(--red)' : 'var(--text)' }}>{value}</div></div>
}
const paceColor = (s) => (s === 'Over pace' ? 'var(--red)' : s === 'Under pace' ? 'var(--amber)' : 'var(--green)')


/* ===================== src/pages/Insights.jsx ===================== */

function InsHead({ title, sub, children }) {
  return <div className="page-head"><div><div className="page-title">{title}</div><div className="page-sub">{sub}</div></div><div className="page-actions">{children}</div></div>
}

/* ============================ REPORT CENTER ============================ */
function Reports() {
  const { sorted } = useSort(reports, { key: 'name', dir: 'asc' })
  const columns = [
    { key: 'name', label: 'Report', sticky: true, width: 280, render: (r) => <div>{r.name}<small>{r.type}</small></div> },
    { key: 'cadence', label: 'Schedule', render: (r) => <span className="tag">{r.cadence}</span> },
    { key: 'format', label: 'Format' },
    { key: 'recipients', label: 'Recipients', num: true, render: (r) => `${r.recipients}` },
    { key: 'owner', label: 'Owner' },
    { key: 'updated', label: 'Updated', render: (r) => <span className="muted">{r.updated}</span> },
    { key: 'act', label: '', render: () => <span style={{ display: 'flex', gap: 6, justifyContent: 'flex-end' }}><Btn sm ghost icon="play">Run</Btn><Btn sm ghost icon="download" /></span> },
  ]
  return (
    <>
      <InsHead title="Report Center" sub="Custom & scheduled reports, dashboards and exports"><Btn icon="file" ghost>Templates</Btn><Btn icon="plus" primary>Build Report</Btn></InsHead>
      <KpiGrid>
        <Kpi label="Saved Reports" value={reports.length} />
        <Kpi label="Scheduled" value={reports.filter(r => /·/.test(r.cadence)).length} />
        <Kpi label="Recipients" value={reports.reduce((s, r) => s + r.recipients, 0)} />
        <Kpi label="Widgets Available" value={reportTemplates.length} />
      </KpiGrid>
      <Card title="Report builder — data sources" sub="Drag widgets onto a custom dashboard" >
        <div className="grid-3">
          {reportTemplates.map((t) => (
            <div key={t} className="lrow" style={{ border: '1px solid var(--border)', borderRadius: 10, padding: 11 }}>
              <div className="icobox" style={{ background: 'var(--brand-soft)', color: 'var(--brand)' }}><Icon name="bars" size={16} /></div>
              <div className="grow"><div className="title" style={{ fontSize: 12.5 }}>{t}</div></div>
              <Icon name="plus" size={15} className="muted" />
            </div>
          ))}
        </div>
      </Card>
      <div style={{ height: 16 }} />
      <DataTable columns={columns} rows={sorted} />
    </>
  )
}

/* ============================ ALERTS ============================ */
function Alerts() {
  const [alerts, setAlerts] = useState(ALERTS)
  const [filter, setFilter] = useState('All')
  const markRead = (id) => setAlerts((a) => a.map((x) => x.id === id ? { ...x, read: true } : x))
  const markAll = () => setAlerts((a) => a.map((x) => ({ ...x, read: true })))
  const sevTone = { high: 'red', med: 'amber', low: 'gray' }
  const shown = alerts.filter((a) => filter === 'All' || (filter === 'Unread' ? !a.read : a.sev === filter.toLowerCase()))
  return (
    <>
      <InsHead title="Alerts" sub="Real-time notifications across ads, budget & retail signals"><Btn icon="check" ghost onClick={markAll}>Mark all read</Btn><Btn icon="gear" primary>Alert Settings</Btn></InsHead>
      <KpiGrid>
        <Kpi label="Unread" value={alerts.filter(a => !a.read).length} />
        <Kpi label="High Severity" value={alerts.filter(a => a.sev === 'high').length} />
        <Kpi label="Today" value={alerts.length} />
      </KpiGrid>
      <div className="toolbar">
        {['All', 'Unread', 'High', 'Med', 'Low'].map((t) => <span key={t} className={`chip ${filter === t ? 'on' : ''}`} onClick={() => setFilter(t)}>{t}</span>)}
      </div>
      <Card pad={false}>
        {shown.map((a) => (
          <div key={a.id} className="lrow" style={{ background: a.read ? 'transparent' : 'var(--brand-soft)' }}>
            <div className="icobox" style={{ background: insSevBg(a.sev), color: insSevColor(a.sev) }}><Icon name={a.icon} size={18} /></div>
            <div className="grow">
              <div className="flex items-center gap-8"><span className="title">{a.title}</span><Pill tone={sevTone[a.sev]}>{a.sev}</Pill></div>
              <div className="desc">{a.body}</div>
            </div>
            <div className="muted" style={{ fontSize: 11, whiteSpace: 'nowrap' }}>{a.time}</div>
            {!a.read && <Btn sm ghost icon="check" onClick={() => markRead(a.id)} />}
          </div>
        ))}
        {shown.length === 0 && <div className="empty">No alerts match this filter</div>}
      </Card>
    </>
  )
}
const insSevBg = (s) => ({ high: 'var(--red-soft)', med: 'var(--amber-soft)', low: '#eef1f6' }[s])
const insSevColor = (s) => ({ high: 'var(--red)', med: 'var(--amber)', low: 'var(--text-2)' }[s])

/* ============================ SETTINGS ============================ */
function Settings() {
  const conns = [
    { name: 'Amazon Ads API', detail: 'SP · SB · SD · profiles US / CA / UK', status: 'Connected', icon: 'ads' },
    { name: 'Amazon DSP', detail: 'Seat: Brightleaf Media', status: 'Connected', icon: 'globe' },
    { name: 'Amazon Marketing Cloud', detail: 'Instance: brightleaf-amc', status: 'Connected', icon: 'database' },
    { name: 'Selling Partner API (SP-API)', detail: 'Vendor Central · Seller Central', status: 'Connected', icon: 'store' },
    { name: 'Walmart Connect', detail: 'Not linked', status: 'Disconnected', icon: 'box' },
  ]
  return (
    <>
      <InsHead title="Settings" sub="Integrations, users & account configuration"><Btn icon="plus" primary>Add Integration</Btn></InsHead>
      <div className="grid-2">
        <Card title="Connected data sources" sub="Advertising & retail integrations" pad={false}>
          {conns.map((c) => (
            <div key={c.name} className="lrow">
              <div className="icobox" style={{ background: 'var(--surface-2)', color: 'var(--text-2)' }}><Icon name={c.icon} size={17} /></div>
              <div className="grow"><div className="title">{c.name}</div><div className="desc">{c.detail}</div></div>
              <Pill tone={c.status === 'Connected' ? 'green' : 'gray'}>{c.status}</Pill>
            </div>
          ))}
        </Card>
        <div style={{ display: 'grid', gap: 16, alignContent: 'start' }}>
          <Card title="Account" sub="Organization profile">
            <Field label="Organization" value="Brightleaf Media (Agency)" />
            <Field label="Default currency" value="USD ($)" />
            <Field label="Account time zone" value="America/Toronto" />
            <Field label="Plan" value="Enterprise · 3 marketplaces" />
          </Card>
          <Card title="Team" sub="4 members">
            {[['JL', 'Jim Laframboise', 'Owner'], ['AR', 'A. Rivera', 'Analyst'], ['MC', 'M. Chen', 'Manager']].map(([i, n, role]) => (
              <div key={n} className="lrow" style={{ padding: '9px 0' }}>
                <div className="avatar" style={{ background: 'var(--brand)' }}>{i}</div>
                <div className="grow"><div className="title" style={{ fontSize: 12.5 }}>{n}</div></div>
                <span className="tag">{role}</span>
              </div>
            ))}
          </Card>
        </div>
      </div>
    </>
  )
}
function Field({ label, value }) {
  return <div className="flex between" style={{ padding: '9px 0', borderBottom: '1px solid var(--border)' }}>
    <span className="muted">{label}</span><b style={{ fontSize: 12.5 }}>{value}</b>
  </div>
}


/* ===================== src/App.jsx ===================== */

function App() {
  return (
    <AppProvider>
      <Layout>
        <Routes>
          <Route path="/" element={<Overview />} />
          <Route path="/ads/campaigns" element={<Campaigns />} />
          <Route path="/ads/adgroups" element={<AdGroups />} />
          <Route path="/ads/targeting" element={<Targeting />} />
          <Route path="/ads/search-terms" element={<SearchTerms />} />
          <Route path="/ads/sov" element={<ShareOfVoice />} />
          <Route path="/ads/dayparting" element={<Dayparting />} />
          <Route path="/dsp" element={<Dsp />} />
          <Route path="/dsp/audiences" element={<Audiences />} />
          <Route path="/dsp/amc" element={<Amc />} />
          <Route path="/commerce/shelf" element={<DigitalShelf />} />
          <Route path="/commerce/buybox" element={<BuyBox />} />
          <Route path="/commerce/products" element={<Products />} />
          <Route path="/rules" element={<Rules />} />
          <Route path="/budgets" element={<Budgets />} />

ReactDOM.createRoot(document.getElementById('root')).render(<RouterProvider><App /></RouterProvider>);

</script>
