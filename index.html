<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CommerceHub — Retail Media Platform</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231a4fd6'/%3E%3Ctext x='16' y='22' font-size='18' font-family='Arial' font-weight='bold' fill='white' text-anchor='middle'%3EC%3C/text%3E%3C/svg%3E" />
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
<style>
:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface-2: #f7f9fc;
  --border: #e6e9ef;
  --border-strong: #d4d9e2;
  --text: #1f2430;
  --text-2: #5b6577;
  --text-3: #8a94a6;
  --brand: #1a4fd6;
  --brand-2: #1a73e8;
  --brand-soft: #eaf1ff;
  --navy: #11203f;
  --green: #1aa260;
  --green-soft: #e6f6ee;
  --red: #d93838;
  --red-soft: #fdecec;
  --amber: #d98a00;
  --amber-soft: #fdf3e0;
  --purple: #6b3fd6;
  --purple-soft: #efeaff;
  --shadow: 0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.06);
  --shadow-lg: 0 8px 28px rgba(16,24,40,.12);
  --radius: 12px;
  --radius-sm: 8px;
  --header-h: 56px;
  --sidebar-w: 232px;
  font-synthesis: none;
  text-rendering: optimizeLegibility;
}

* { box-sizing: border-box; }
html, body, #root { height: 100%; }
body {
  margin: 0;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: #cfd5e0; border-radius: 6px; border: 2px solid var(--bg); }
::-webkit-scrollbar-track { background: transparent; }

/* ---------- App shell ---------- */
.app { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar {
  width: var(--sidebar-w);
  background: var(--navy);
  color: #c8d2e4;
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; bottom: 0; left: 0;
  z-index: 30;
}
.sidebar-brand {
  height: var(--header-h);
  display: flex; align-items: center; gap: 10px;
  padding: 0 18px;
  color: #fff;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.brand-logo {
  width: 28px; height: 28px; border-radius: 7px;
  background: linear-gradient(135deg, var(--brand-2), var(--brand));
  display: grid; place-items: center;
  font-weight: 800; color: #fff; font-size: 15px;
  flex: 0 0 auto;
}
.brand-name { font-weight: 700; font-size: 15px; letter-spacing: -.2px; }
.brand-name span { color: #7fa6ff; }

.module-switch { padding: 14px 12px 6px; }
.module-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: #6b7a96; padding: 0 8px 6px; }
.module-pill {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 10px; border-radius: var(--radius-sm);
  color: #aeb9cf; font-weight: 600; font-size: 12.5px;
  cursor: pointer; margin-bottom: 2px;
}
.module-pill:hover { background: rgba(255,255,255,.05); color: #fff; }
.module-pill.active { background: var(--brand); color: #fff; }
.module-pill .ico { width: 17px; height: 17px; flex: 0 0 auto; }

.nav-section { padding: 8px 12px; overflow-y: auto; flex: 1; }
.nav-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: #6b7a96; padding: 12px 10px 6px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: var(--radius-sm);
  color: #b6c0d6; font-size: 12.5px; cursor: pointer; margin-bottom: 1px;
}
.nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }
.nav-item.active { background: rgba(127,166,255,.16); color: #fff; font-weight: 600; }
.nav-item .ico { width: 16px; height: 16px; flex: 0 0 auto; opacity: .9; }
.nav-badge { margin-left: auto; font-size: 10px; background: rgba(255,255,255,.12); padding: 1px 6px; border-radius: 10px; }

.sidebar-foot { padding: 12px; border-top: 1px solid rgba(255,255,255,.08); display: flex; align-items: center; gap: 10px; }
.avatar { width: 30px; height: 30px; border-radius: 50%; background: #3a5a9e; color:#fff; display: grid; place-items: center; font-weight: 700; font-size: 12px; }
.sidebar-foot .who { font-size: 12px; color: #e6ecf7; font-weight: 600; }
.sidebar-foot .who small { display: block; color: #8595b3; font-weight: 500; font-size: 10.5px; }
.app-version { margin-left: auto; align-self: flex-end; font-size: 10px; font-weight: 600; color: #66738f; letter-spacing: .02em; }

/* Main */
.main { flex: 1; margin-left: var(--sidebar-w); display: flex; flex-direction: column; min-width: 0; }
.topbar {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px;
  padding: 0 22px; position: sticky; top: 0; z-index: 20;
}
.crumb { display:flex; align-items:center; gap: 8px; color: var(--text-3); font-size: 12.5px; }
.crumb b { color: var(--text); font-weight: 700; font-size: 14px; }
.crumb .sep { color: var(--border-strong); }
.topbar-spacer { flex: 1; }
.topbar-ctrl {
  display:flex; align-items:center; gap: 7px; height: 32px; padding: 0 11px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text-2); font-size: 12px; font-weight: 500;
}
.topbar-ctrl:hover { border-color: var(--border-strong); color: var(--text); }
.topbar-ctrl .ico { width: 15px; height: 15px; }
.topbar-ctrl .badge { background: var(--brand); color: #fff; border-radius: 9px; font-size: 10px; padding: 0 5px; font-weight:700;}

.content { padding: 20px 22px 60px; flex: 1; }
.page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 16px; gap: 16px; flex-wrap: wrap; }
.page-title { font-size: 19px; font-weight: 750; letter-spacing: -.3px; }
.page-sub { color: var(--text-2); margin-top: 2px; font-size: 12.5px; }
.page-actions { display: flex; gap: 8px; align-items: center; }

/* Buttons */
.btn { display:inline-flex; align-items:center; gap:7px; height: 32px; padding: 0 13px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--surface); color: var(--text); font-size: 12.5px; font-weight: 600; }
.btn:hover { background: var(--surface-2); }
.btn.primary { background: var(--brand); border-color: var(--brand); color: #fff; }
.btn.primary:hover { background: #1644bd; }
.btn.ghost { border-color: transparent; background: transparent; color: var(--text-2); }
.btn.ghost:hover { background: var(--surface-2); color: var(--text); }
.btn .ico { width: 15px; height: 15px; }
.btn.sm { height: 27px; padding: 0 10px; font-size: 11.5px; }

/* Tabs (view selector) */
.viewtabs { display: flex; gap: 2px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; margin-bottom: 16px; overflow-x: auto; }
.viewtab { padding: 7px 13px; border-radius: 7px; font-size: 12.5px; font-weight: 600; color: var(--text-2); white-space: nowrap; }
.viewtab:hover { background: var(--surface-2); color: var(--text); }
.viewtab.active { background: var(--brand-soft); color: var(--brand); }

/* KPI cards */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 18px; }
.kpi {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 13px 15px; box-shadow: var(--shadow); position: relative;
}
.kpi .k-label { color: var(--text-2); font-size: 11.5px; font-weight: 600; display:flex; align-items:center; gap:6px;}
.kpi .k-val { font-size: 22px; font-weight: 750; letter-spacing: -.5px; margin-top: 5px; }
.kpi .k-delta { font-size: 11px; font-weight: 700; margin-top: 4px; display: inline-flex; align-items: center; gap: 3px; }
.k-delta.up { color: var(--green); }
.k-delta.down { color: var(--red); }
.kpi .k-spark { position:absolute; right:12px; bottom:10px; opacity:.85; }

/* Card / panel */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
.card-head { display:flex; align-items:center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); }
.card-head h3 { margin: 0; font-size: 14px; font-weight: 700; }
.card-head .sub { color: var(--text-2); font-size: 12px; font-weight: 500; }
.card-body { padding: 16px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
@media (max-width: 1100px){ .grid-2,.grid-3 { grid-template-columns: 1fr; } }

/* Toolbar above tables */
.toolbar { display:flex; align-items:center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
.search {
  display:flex; align-items:center; gap: 8px; height: 34px; padding: 0 12px; flex: 1; min-width: 220px; max-width: 380px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-3);
}
.search input { border: none; outline: none; background: transparent; font-size: 12.5px; color: var(--text); width: 100%; }
.chip { display:inline-flex; align-items:center; gap:6px; height: 28px; padding: 0 10px; border-radius: 16px; background: var(--surface); border: 1px solid var(--border); color: var(--text-2); font-size: 11.5px; font-weight: 600;}
.chip.on { background: var(--brand-soft); border-color: #cdddff; color: var(--brand); }
.bulkbar { display:flex; align-items:center; gap: 10px; background: var(--navy); color:#fff; border-radius: var(--radius-sm); padding: 8px 14px; margin-bottom: 12px; }
.bulkbar .sel { font-weight: 700; }
.bulkbar .btn { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.18); color:#fff; }
.bulkbar .btn:hover { background: rgba(255,255,255,.2); }

/* Table */
.tablewrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); box-shadow: var(--shadow); }
table.dt { border-collapse: collapse; width: 100%; font-size: 12.5px; min-width: 100%; }
table.dt th, table.dt td { padding: 10px 12px; text-align: left; white-space: nowrap; }
table.dt thead th {
  background: var(--surface-2); color: var(--text-2); font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .03em;
  border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 2;
}
table.dt th.num, table.dt td.num { text-align: right; font-variant-numeric: tabular-nums; }
table.dt tbody tr { border-bottom: 1px solid var(--border); }
table.dt tbody tr:hover { background: var(--surface-2); }
table.dt tbody tr:last-child { border-bottom: none; }
.cellname { font-weight: 600; color: var(--text); max-width: 360px; white-space: normal; }
.cellname small { display:block; color: var(--text-3); font-weight: 500; }
.celllink { color: var(--brand); font-weight: 600; cursor: pointer; text-decoration: none; }
.celllink:hover { text-decoration: underline; }
.drillbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; padding: 9px 14px; background: var(--brand-soft); border: 1px solid var(--border); border-radius: 10px; font-size: 12.5px; }
.drillbar .celllink { display: inline-flex; align-items: center; gap: 3px; }
.cm-foot { padding: 6px 10px; font-size: 11px; border-top: 1px solid var(--border); margin-top: 4px; }
.sticky-l { position: sticky; left: 0; background: var(--surface); z-index: 1; }
table.dt tbody tr:hover .sticky-l { background: var(--surface-2); }
thead .sticky-l { z-index: 3; background: var(--surface-2); }

/* Status pills */
.pill { display:inline-flex; align-items:center; gap:6px; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.pill .dot { width:7px; height:7px; border-radius:50%; }
.pill.green { background: var(--green-soft); color: #0f7a47; }
.pill.green .dot { background: var(--green); }
.pill.red { background: var(--red-soft); color: var(--red); }
.pill.red .dot { background: var(--red); }
.pill.amber { background: var(--amber-soft); color: #9a6300; }
.pill.amber .dot { background: var(--amber); }
.pill.gray { background: #eef1f6; color: var(--text-2); }
.pill.gray .dot { background: var(--text-3); }
.pill.blue { background: var(--brand-soft); color: var(--brand); }
.pill.blue .dot { background: var(--brand); }
.pill.purple { background: var(--purple-soft); color: var(--purple); }
.pill.purple .dot { background: var(--purple); }

.tag { display:inline-block; padding: 1px 7px; border-radius: 5px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text-2); font-size: 11px; font-weight: 600; }

/* Toggle */
.toggle { width: 34px; height: 19px; border-radius: 20px; background: #c9d0dc; position: relative; transition: .15s; border:none; padding:0; flex:0 0 auto;}
.toggle.on { background: var(--green); }
.toggle::after { content:''; position:absolute; top:2px; left:2px; width: 15px; height:15px; border-radius:50%; background:#fff; transition:.15s; box-shadow: 0 1px 2px rgba(0,0,0,.2);}
.toggle.on::after { left: 17px; }

.bidcell { display:flex; align-items:center; gap:6px; }
.bidcell .ed { color: var(--brand); font-weight:700; }
.miniprog { width: 70px; height: 6px; background: #eef1f6; border-radius: 4px; overflow: hidden; }
.miniprog > span { display:block; height: 100%; background: var(--brand); }

/* Checkboxes */
.cb { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border-strong); display:inline-grid; place-items:center; cursor:pointer; background:#fff;}
.cb.on { background: var(--brand); border-color: var(--brand); color:#fff; }

/* Misc */
.muted { color: var(--text-2); }
.flex { display:flex; }
.between { justify-content: space-between; }
.items-center { align-items: center; }
.gap-8 { gap: 8px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; }
.mt-8{margin-top:8px;} .mt-16{margin-top:16px;} .mb-12{margin-bottom:12px;}
.right { text-align: right; }
.legend { display:flex; gap: 14px; flex-wrap: wrap; }
.legend span { display:inline-flex; align-items:center; gap:6px; font-size:12px; color: var(--text-2); }
.legend i { width:10px;height:10px;border-radius:3px;display:inline-block;}
.section-title { font-size: 13px; font-weight: 750; margin: 4px 0 12px; color: var(--text); }
.hint { background: var(--brand-soft); border: 1px solid #d4e3ff; color: #234; border-radius: var(--radius-sm); padding: 10px 13px; font-size: 12px; display:flex; gap:10px; align-items:flex-start; }
.hint .ico { color: var(--brand); flex:0 0 auto; margin-top:1px;}

/* Rule / list rows */
.lrow { display:flex; align-items:center; gap: 14px; padding: 13px 16px; border-bottom: 1px solid var(--border); }
.lrow:last-child { border-bottom:none; }
.lrow:hover { background: var(--surface-2); }
.lrow .icobox { width:36px;height:36px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto;}
.lrow .grow { flex:1; min-width:0; }
.lrow .title { font-weight: 650; }
.lrow .desc { color: var(--text-2); font-size: 11.5px; margin-top:2px; }

/* Dayparting heatmap */
.heat { display:grid; grid-template-columns: 42px repeat(24, 1fr); gap: 3px; }
.heat .hh { font-size: 9.5px; color: var(--text-3); text-align:center; }
.heat .rl { font-size: 11px; color: var(--text-2); display:flex; align-items:center; font-weight:600;}
.heat .cell { height: 22px; border-radius: 4px; display:grid; place-items:center; font-size:9px; color: rgba(255,255,255,.95); cursor:pointer;}

/* Progress bars in budget */
.pace { height: 9px; border-radius: 6px; background: #eef1f6; overflow: hidden; position: relative; }
.pace > span { display:block; height:100%; border-radius:6px; }
.pacelabel { display:flex; justify-content: space-between; font-size: 11px; color: var(--text-2); margin-top:5px; }

/* small donut */
.metric-inline { display:flex; align-items:center; gap: 8px; }

.footnote { color: var(--text-3); font-size: 11px; margin-top: 10px; }
.empty { padding: 40px; text-align:center; color: var(--text-3); }

/* ---------------- DataGrid ---------------- */
.gridbar { display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
.gridbar .gb-left { display:flex; align-items:center; gap:10px; flex-wrap:wrap; flex:1; min-width:240px; }
.gridbar .gb-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.gtoggle { display:inline-flex; align-items:center; gap:7px; font-size:11.5px; font-weight:600; color:var(--text-2); white-space:nowrap; }

/* sortable headers */
table.dt th.sortable { cursor:pointer; user-select:none; }
table.dt th.sortable:hover { background: var(--brand-soft); }
.th-in { display:inline-flex; align-items:center; gap:4px; }
table.dt th.num .th-in { flex-direction:row-reverse; }
.caret { color: var(--text-3); opacity:.0; transition:opacity .12s; }
table.dt th.sortable:hover .caret { opacity:.55; }
.caret.on { color: var(--brand); opacity:1; }

/* density */
table.dt.dense th, table.dt.dense td { padding: 5px 12px; }

/* totals row */
table.dt tfoot .trow td { position: sticky; bottom: 0; background: var(--surface-2); border-top: 2px solid var(--border-strong); font-weight: 700; z-index: 2; }
table.dt tfoot .trow td.sticky-l { z-index: 4; }

/* group-by rows */
table.dt tr.grow td { background: var(--brand-soft); font-weight: 700; color: var(--text); border-top: 1px solid #cdddff; border-bottom: 1px solid #cdddff; }
table.dt tr.grow td.sticky-l { background: var(--brand-soft); }

/* compare delta chip */
.gdelta { display:inline-block; margin-left:6px; font-size:10px; font-weight:700; }
.gdelta.up { color: var(--green); }
.gdelta.down { color: var(--red); }

/* pager */
.pager { display:flex; align-items:center; gap:14px; flex-wrap:wrap; padding:10px 2px; font-size:12px; color:var(--text-2); }
.pager b { color: var(--text); }
.pg-size select { margin-left:6px; height:28px; border:1px solid var(--border); border-radius:6px; background:var(--surface); color:var(--text); padding:0 6px; font-size:12px; }
.pg-nav { display:flex; align-items:center; gap:4px; }
.pg-nav button { min-width:28px; height:28px; padding:0 7px; border:1px solid var(--border); background:var(--surface); border-radius:6px; color:var(--text-2); font-size:12px; cursor:pointer; }
.pg-nav button:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.pg-nav button.on { background: var(--brand); border-color: var(--brand); color:#fff; }
.pg-nav button:disabled { opacity:.4; cursor:not-allowed; }
.pg-gap { padding:0 2px; color: var(--text-3); }
.pg-go { display:inline-flex; align-items:center; gap:6px; margin-left:6px; }
.pg-go input { width:52px; height:28px; border:1px solid var(--border); border-radius:6px; padding:0 6px; font-size:12px; background:var(--surface); color:var(--text); }

/* popover + column menu */
.pop-wrap { position: relative; display:inline-block; }
.pop { position:absolute; top: calc(100% + 6px); left:0; z-index:50; background:var(--surface); border:1px solid var(--border); border-radius:10px; box-shadow: var(--shadow-lg); padding:6px; }
.pop.pop-r { left:auto; right:0; }
.colmenu { font-size:12px; }
.cm-head { font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--text-3); font-weight:700; padding:6px 8px 4px; }
.cm-presets { display:flex; flex-wrap:wrap; gap:4px; padding:4px 6px 8px; border-bottom:1px solid var(--border); margin-bottom:4px; }
.cm-preset { border:1px solid var(--border); background:var(--surface); border-radius:14px; padding:3px 10px; font-size:11px; font-weight:600; color:var(--text-2); cursor:pointer; }
.cm-preset:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.cm-preset.on { background: var(--brand-soft); border-color:#cdddff; color: var(--brand); }
.cm-preset:disabled { opacity:.55; cursor:default; }
.cm-list { max-height: 320px; overflow-y:auto; }
.cm-cols .cm-row { display:flex; align-items:center; gap:8px; padding:5px 8px; border-radius:6px; }
.cm-cols .cm-row:hover { background: var(--surface-2); }
.cm-label { flex:1; white-space:nowrap; }
.cm-move { display:inline-flex; gap:2px; }
.cm-move button { width:20px; height:20px; border:1px solid var(--border); background:var(--surface); border-radius:5px; color:var(--text-3); cursor:pointer; line-height:1; font-size:11px; }
.cm-move button:hover { border-color: var(--brand); color: var(--brand); }
.cm-opt { padding:7px 10px; border-radius:6px; cursor:pointer; }
.cm-opt:hover { background: var(--surface-2); }
.cm-opt.on { background: var(--brand-soft); color: var(--brand); font-weight:600; }

/* ---------------- FilterBar ---------------- */
.fb-wrap { display:inline-flex; align-items:center; gap:6px; flex-wrap:wrap; }

// Number / currency / percent formatting helpers

const cur = (n, symbol = '$', dec = 0) => {
  if (n == null || isNaN(n)) return '—'
  const neg = n < 0
  const v = Math.abs(n)
  const s = v.toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec })
  return `${neg ? '-' : ''}${symbol}${s}`
}

const compact = (n, symbol = '') => {
  if (n == null || isNaN(n)) return '—'
  const abs = Math.abs(n)
  let out
  if (abs >= 1e9) out = (n / 1e9).toFixed(1).replace(/\.0$/, '') + 'B'
  else if (abs >= 1e6) out = (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M'
  else if (abs >= 1e3) out = (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'K'
  else out = Math.round(n).toLocaleString('en-US')
  return symbol + out
}

const money = (n, symbol = '$') => {
  if (n == null || isNaN(n)) return '—'
  const abs = Math.abs(n)
  if (abs >= 1e6) return `${symbol}${(n / 1e6).toFixed(2)}M`
  if (abs >= 1e4) return `${symbol}${(n / 1e3).toFixed(1)}K`
  return `${symbol}${n.toLocaleString('en-US', { maximumFractionDigits: 0 })}`

  const clk = Math.max(20, Math.round((impr * ctr) / 100))
  const cpc = range(2.2, 5.8)
  const spend = clk * cpc
  const cvr = range(28, 70)
  const orders = Math.max(1, Math.round((clk * cvr) / 100))
  const asp = range(11, 24)
  const aov = asp * range(1.0, 1.5)
  const sales = orders * aov
  const units = Math.round(orders * range(1.0, 1.4))
  const ntb = Math.round(orders * range(0, 0.35))
  const atc = Math.round(clk * range(0.02, 0.12))
  return {
    impr: Math.round(impr), clk, ctr, cpc, spend, cvr, orders, asp, aov,
    sales, units, ntb, atc,
    acos: (spend / sales) * 100,
    roas: sales / spend,
    cpa: spend / orders,
  }
}

// ---------------------------------------------------------------------------
// Time-series for charts (last 30 days)
// ---------------------------------------------------------------------------
const timeseries = (() => {
  const out = []
  const today = new Date('2026-06-19')
  for (let i = 29; i >= 0; i--) {
    const d = new Date(today)
    d.setDate(d.getDate() - i)
    const dow = d.getDay()
    const weekend = dow === 0 || dow === 6 ? 1.18 : 1
    const base = 120000 + Math.sin(i / 3) * 22000 + (29 - i) * 2400
    const impr = Math.round(base * weekend * (1 + range(-0.08, 0.08)))
    const clicks = Math.round(impr * range(0.0026, 0.0038))
    const spend = Math.round(clicks * range(3.1, 4.2))
    const orders = Math.round(clicks * range(0.42, 0.6))
    const sales = Math.round(orders * range(15, 22))
    out.push({
      date: `${d.getMonth() + 1}/${d.getDate()}`,
      impr, clicks, spend, orders, sales,
      acos: +((spend / sales) * 100).toFixed(1),
      roas: +(sales / spend).toFixed(2),
    })
  }
  return out
})()

// ---------------------------------------------------------------------------
// Aggregations / KPI helpers
// ---------------------------------------------------------------------------
function aggregate(rows) {
  const sum = (k) => rows.reduce((a, b) => a + (b[k] || 0), 0)
  const impr = sum('impr'), clk = sum('clk'), spend = sum('spend'),
    sales = sum('sales'), orders = sum('orders'), units = sum('units')
  return {
    impr, clk, spend, sales, orders, units,
    ctr: (clk / impr) * 100,
    cpc: spend / clk,
    acos: (spend / sales) * 100,
    roas: sales / spend,
    cvr: (orders / clk) * 100,
    cpa: spend / orders,
    aov: sales / orders,
  }
}

function campaignsFor(profileId) {
  return profileId === 'all' ? campaigns : campaigns.filter((c) => c.profileId === profileId)
}

/* sorting hook for tables */
function useSort(rows, initial) {
  const [sort, setSort] = useState(initial || { key: null, dir: 'desc' })
  const sorted = useMemo(() => {
    if (!sort.key) return rows
    const r = [...rows].sort((a, b) => {
      const x = a[sort.key], y = b[sort.key]
      if (typeof x === 'number') return sort.dir === 'asc' ? x - y : y - x
      return sort.dir === 'asc' ? String(x).localeCompare(String(y)) : String(y).localeCompare(String(x))
    })
    return r
  }, [rows, sort])
  const toggle = (key) => setSort((s) => ({ key, dir: s.key === key && s.dir === 'desc' ? 'asc' : 'desc' }))
  return { sorted, sort, toggle }
}

/* ============================================================================
   DataGrid — the reusable Pacvue-style grid used by every advertising view.
   Features: sort every column, column presets + custom chooser (show/hide/
   reorder, persisted), pagination (page-size · total · go-to-page), pinned
   totals row, frozen first column + horizontal scroll, group-by (Dimensions),
   period-compare toggle, density toggle.

   columns: [{ key, label, num?, sticky?, width?, render?(row), sortVal?(row),
               sort?:false, foot?(rows)=>node, delta?:true }]
   presets: { 'View Name': [colKey,...] }      dimensions: [{ key, label }]
   ========================================================================== */
const gridStore = {
  get(id) { try { return JSON.parse(localStorage.getItem('chgrid:' + id)) } catch (e) { return null } },
  set(id, v) { try { localStorage.setItem('chgrid:' + id, JSON.stringify(v)) } catch (e) { /* ignore */ } },
}
function hashUnit(s) { let h = 2166136261; for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619) } return ((h >>> 0) % 1000) / 1000 }
function pageList(cur, total) {
  const out = []
  if (total <= 7) { for (let i = 1; i <= total; i++) out.push(i); return out }
  out.push(1)
  if (cur > 3) out.push('…')
  for (let i = Math.max(2, cur - 1); i <= Math.min(total - 1, cur + 1); i++) out.push(i)
  if (cur < total - 2) out.push('…')
  out.push(total)
  return out
}

function Popover({ trigger, children, align = 'left', width }) {
  const [open, setOpen] = useState(false)
  const ref = useRef(null)
  useEffect(() => {
    if (!open) return
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false) }
    const k = (e) => { if (e.key === 'Escape') setOpen(false) }
    document.addEventListener('mousedown', h); document.addEventListener('keydown', k)
    return () => { document.removeEventListener('mousedown', h); document.removeEventListener('keydown', k) }
  }, [open])
  return (
    <div className="pop-wrap" ref={ref}>
      <span onClick={() => setOpen((o) => !o)}>{trigger}</span>
      {open && (
        <div className={`pop ${align === 'right' ? 'pop-r' : ''}`} style={width ? { width } : undefined}>
          {typeof children === 'function' ? children(() => setOpen(false)) : children}
        </div>
      )}
    </div>
  )
}

function SortCaret({ active, dir }) {
  if (!active) return <Icon name="chevDown" size={11} className="caret" />
  return <Icon name={dir === 'asc' ? 'arrowUp' : 'arrowDown'} size={11} className="caret on" />
}
function DeltaChip({ row, ck, rk, prevRow }) {
  let d
  if (prevRow) {
    const cur = Number(row[ck]); const prev = Number(prevRow[ck])
    if (!isFinite(cur) || !isFinite(prev) || prev === 0) return null
    d = (cur - prev) / Math.abs(prev)
  } else {
    d = (hashUnit(String(row[rk]) + ':' + ck) - 0.42) * 0.6 // fallback mock
  }
  const up = d >= 0
  return <span className={`gdelta ${up ? 'up' : 'down'}`}>{up ? '▲' : '▼'}{Math.abs(d * 100).toFixed(1)}%</span>
}

function DataGrid({
  id, columns, rows, initialSort,
  presets, defaultPreset, dimensions, totals, compare, comparePrev,
  selectable, selected, onToggle, onToggleAll, rowKey = 'id',
  pageSizes = [25, 50, 100], empty = 'No data', toolbarLeft,
}) {
  const colByKey = useMemo(() => Object.fromEntries(columns.map((c) => [c.key, c])), [columns])
  const allKeys = useMemo(() => columns.map((c) => c.key), [columns])
  const stickyKey = (columns.find((c) => c.sticky) || {}).key
  const presetCols = (name) => (presets && presets[name]) ? presets[name] : allKeys

  const saved = useMemo(() => (id ? gridStore.get(id) : null), [id])
  const firstPreset = defaultPreset || (presets ? Object.keys(presets)[0] : null)
  const [view, setView] = useState(saved?.view || firstPreset || 'Default')
  const [order, setOrder] = useState(saved?.order?.filter((k) => colByKey[k])?.concat(allKeys.filter((k) => !(saved.order || []).includes(k))) || (firstPreset ? [...presetCols(firstPreset), ...allKeys.filter((k) => !presetCols(firstPreset).includes(k))] : allKeys))
  const [hidden, setHidden] = useState(new Set(saved?.hidden || (firstPreset ? allKeys.filter((k) => !presetCols(firstPreset).includes(k)) : [])))

  useEffect(() => { if (id) gridStore.set(id, { view, order, hidden: [...hidden] }) }, [id, view, order, hidden])

  const applyPreset = (name) => {
    setView(name)
    const keys = presetCols(name)
    setOrder([...keys, ...allKeys.filter((k) => !keys.includes(k))])
    setHidden(new Set(allKeys.filter((k) => !keys.includes(k))))
  }
  const toggleCol = (k) => { setView('Custom'); setHidden((h) => { const n = new Set(h); n.has(k) ? n.delete(k) : n.add(k); return n }) }
  const moveCol = (k, dir) => {
    setView('Custom')
    setOrder((o) => { const a = [...o]; const i = a.indexOf(k); const j = i + dir; if (i < 0 || j < 0 || j >= a.length) return a;[a[i], a[j]] = [a[j], a[i]]; return a })
  }

  const visibleCols = useMemo(() => {
    const ordered = [...order.filter((k) => colByKey[k]), ...allKeys.filter((k) => !order.includes(k))]
    let vis = ordered.filter((k) => k === stickyKey || !hidden.has(k)).map((k) => colByKey[k])
    if (stickyKey) vis = [colByKey[stickyKey], ...vis.filter((c) => c.key !== stickyKey)]
    return vis
  }, [order, hidden, colByKey, allKeys, stickyKey])

  const [sort, setSort] = useState(initialSort || { key: null, dir: 'desc' })
  const onSort = (k) => setSort((s) => (s.key === k ? { key: k, dir: s.dir === 'desc' ? 'asc' : 'desc' } : { key: k, dir: typeof rows[0]?.[k] === 'number' ? 'desc' : 'asc' }))
  const sortedAll = useMemo(() => {
    if (!sort.key) return rows
    const col = colByKey[sort.key]
    const val = (r) => (col?.sortVal ? col.sortVal(r) : r[sort.key])
    return [...rows].sort((a, b) => {
      const x = val(a), y = val(b)
      if (typeof x === 'number' && typeof y === 'number') return sort.dir === 'asc' ? x - y : y - x
      return sort.dir === 'asc' ? String(x).localeCompare(String(y)) : String(y).localeCompare(String(x))
    })
  }, [rows, sort, colByKey])

  const [compareOn, setCompareOn] = useState(false)
  const [dense, setDense] = useState(false)
  const [groupKey, setGroupKey] = useState(null)
  const grouped = !!groupKey

  const [pageSize, setPageSize] = useState(pageSizes[0])
  const [page, setPage] = useState(1)
  const totalEntries = rows.length
  const pageCount = Math.max(1, Math.ceil(totalEntries / pageSize))
  const curPage = Math.min(page, pageCount)
  useEffect(() => { setPage(1) }, [pageSize, groupKey, totalEntries, sort.key, sort.dir])
  const pageRows = grouped ? sortedAll : sortedAll.slice((curPage - 1) * pageSize, curPage * pageSize)

  const groups = useMemo(() => {
    if (!grouped) return null
    const map = new Map()
    for (const r of sortedAll) { const g = r[groupKey] ?? '—'; if (!map.has(g)) map.set(g, []); map.get(g).push(r) }
    return [...map.entries()].map(([k, rs]) => ({ key: k, rows: rs }))
  }, [grouped, groupKey, sortedAll])

  const colSpan = visibleCols.length + (selectable ? 1 : 0)
  const allOn = selectable && pageRows.length > 0 && pageRows.every((r) => selected?.has(r[rowKey]))

  const cell = (c, r) => (
    <td key={c.key} className={`${c.num ? 'num' : ''} ${c.sticky ? 'sticky-l cellname' : ''}`}>
      {c.render ? c.render(r) : r[c.key]}
      {compareOn && c.delta && <DeltaChip row={r} ck={c.key} rk={rowKey} prevRow={comparePrev ? comparePrev[r[rowKey]] : null} />}
    </td>
  )
  const dimLabel = grouped ? (dimensions.find((d) => d.key === groupKey)?.label || groupKey) : null

  return (
    <>
      <div className="gridbar">
        <div className="gb-left">{toolbarLeft}</div>
        <div className="gb-right">
          {compare && (
            <label className="gtoggle"><Toggle on={compareOn} onClick={() => setCompareOn((v) => !v)} /> vs prev period</label>
          )}
          <span className={`chip ${dense ? 'on' : ''}`} onClick={() => setDense((d) => !d)}><Icon name="bars" size={13} /> Compact</span>
          {dimensions && (
            <Popover align="right" width={200} trigger={<Btn sm ghost icon="layers">{grouped ? `Grouped: ${dimLabel}` : 'Dimensions'}</Btn>}>
              {(close) => (
                <div className="colmenu">
                  <div className="cm-head">Group rows by</div>
                  <div className="cm-list">
                    <div className={`cm-opt ${!grouped ? 'on' : ''}`} onClick={() => { setGroupKey(null); close() }}>None</div>
                    {dimensions.map((d) => (
                      <div key={d.key} className={`cm-opt ${groupKey === d.key ? 'on' : ''}`} onClick={() => { setGroupKey(d.key); close() }}>{d.label}</div>
                    ))}
                  </div>
                </div>
              )}
            </Popover>
          )}
          <Popover align="right" width={272} trigger={<Btn sm ghost icon="sliders">Columns</Btn>}>
            <div className="colmenu">
              {presets && (
                <div className="cm-presets">
                  {Object.keys(presets).map((p) => (
                    <button key={p} className={`cm-preset ${view === p ? 'on' : ''}`} onClick={() => applyPreset(p)}>{p}</button>
                  ))}
                  <button className={`cm-preset ${view === 'Custom' ? 'on' : ''}`} disabled>Custom</button>
                </div>
              )}
              <div className="cm-head">Columns ({visibleCols.length})</div>
              <div className="cm-list cm-cols">
                {[...order.filter((k) => colByKey[k]), ...allKeys.filter((k) => !order.includes(k))].map((k) => {
                  const c = colByKey[k]; const isSticky = k === stickyKey
                  return (
                    <div key={k} className="cm-row">
                      <Check on={isSticky || !hidden.has(k)} onClick={() => !isSticky && toggleCol(k)} />
                      <span className="cm-label">{c.label || k}{isSticky && <span className="muted"> · pinned</span>}</span>
                      <span className="cm-move">
                        <button onClick={() => moveCol(k, -1)} title="Move up">↑</button>
                        <button onClick={() => moveCol(k, 1)} title="Move down">↓</button>
                      </span>
                    </div>
                  )
                })}
              </div>
            </div>
          </Popover>
        </div>
      </div>

      <div className="tablewrap">
        <table className={`dt ${dense ? 'dense' : ''}`}>
          <thead>
            <tr>
              {selectable && <th className="sticky-l" style={{ width: 36 }}><Check on={allOn} onClick={onToggleAll} /></th>}
              {visibleCols.map((c) => (
                <th key={c.key} className={`${c.num ? 'num' : ''} ${c.sticky ? 'sticky-l' : ''} ${c.sort === false ? '' : 'sortable'}`}
                  style={c.width ? { minWidth: c.width } : undefined}
                  onClick={() => c.sort !== false && onSort(c.key)}>
                  <span className="th-in">{c.label}{c.sort !== false && <SortCaret active={sort.key === c.key} dir={sort.dir} />}</span>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {pageRows.length === 0 && <tr><td colSpan={colSpan} className="empty">{empty}</td></tr>}
            {!grouped && pageRows.map((r) => (
              <tr key={r[rowKey]}>
                {selectable && <td className="sticky-l"><Check on={selected?.has(r[rowKey])} onClick={() => onToggle(r[rowKey])} /></td>}
                {visibleCols.map((c) => cell(c, r))}
              </tr>
            ))}
            {grouped && groups.map((g) => (
              <Fragment key={g.key}>
                <tr className="grow">
                  <td className="sticky-l" colSpan={1 + (selectable ? 1 : 0)}><Icon name="chevDown" size={12} /> {String(g.key)} <span className="muted">({g.rows.length})</span></td>
                  {visibleCols.slice(1).map((c) => <td key={c.key} className={c.num ? 'num' : ''}>{c.foot ? c.foot(g.rows) : ''}</td>)}
                </tr>
                {g.rows.map((r) => (
                  <tr key={r[rowKey]}>
                    {selectable && <td className="sticky-l"><Check on={selected?.has(r[rowKey])} onClick={() => onToggle(r[rowKey])} /></td>}
                    {visibleCols.map((c) => cell(c, r))}
                  </tr>
                ))}
              </Fragment>
            ))}
          </tbody>
          {totals && (
            <tfoot>
              <tr className="trow">
                {selectable && <td className="sticky-l" />}
                {visibleCols.map((c, i) => (
                  <td key={c.key} className={`${c.num ? 'num' : ''} ${c.sticky ? 'sticky-l' : ''}`}>
                    {i === 0 ? <b>Total · {totalEntries}</b> : (c.foot ? c.foot(rows) : '')}
                  </td>
                ))}
              </tr>
            </tfoot>
          )}
        </table>
      </div>

      <div className="pager">
        <span className="pg-total">Total <b>{totalEntries.toLocaleString()}</b> entries</span>
        <div className="pg-size">
          Rows:
          <select value={pageSize} onChange={(e) => setPageSize(+e.target.value)}>
            {pageSizes.map((n) => <option key={n} value={n}>{n}</option>)}
          </select>
        </div>
        <div style={{ flex: 1 }} />
        {grouped ? (
          <span className="muted">Grouped — all rows shown</span>
        ) : (
          <div className="pg-nav">
            <button disabled={curPage <= 1} onClick={() => setPage(curPage - 1)}>‹</button>
            {pageList(curPage, pageCount).map((p, i) => (p === '…'
              ? <span key={'g' + i} className="pg-gap">…</span>
              : <button key={p} className={p === curPage ? 'on' : ''} onClick={() => setPage(p)}>{p}</button>))}
            <button disabled={curPage >= pageCount} onClick={() => setPage(curPage + 1)}>›</button>
            <span className="pg-go">Go to
              <input type="number" min={1} max={pageCount} defaultValue={curPage}
                onKeyDown={(e) => { if (e.key === 'Enter') { const v = +e.target.value; if (v >= 1 && v <= pageCount) setPage(v) } }} />
            </span>
          </div>
        )}
      </div>
    </>
  )
}

/* ============================================================================
   FilterBar — schema-driven filter builder + saved Plans (Phase 2).
   fields: [{ key, label, type:'text'|'enum'|'number', options? }]
   model:  { join:'AND'|'OR', conditions:[{ id, field, op, value }] }
   Use applyFilters(rows, model, fields) to get filtered rows.
   ========================================================================== */
const filterStore = {
  get(id) { try { return JSON.parse(localStorage.getItem('chfilter:' + id)) } catch (e) { return null } },
  set(id, v) { try { localStorage.setItem('chfilter:' + id, JSON.stringify(v)) } catch (e) { /* ignore */ } },
}
const planStore = {
  get(id) { try { return JSON.parse(localStorage.getItem('chplan:' + id)) } catch (e) { return null } },
  set(id, v) { try { localStorage.setItem('chplan:' + id, JSON.stringify(v)) } catch (e) { /* ignore */ } },
}
function loadFilterModel(id) { return filterStore.get(id) || { join: 'AND', conditions: [] } }

const OPS = {
  text: [{ op: 'contains', label: 'contains' }, { op: 'notcontains', label: 'does not contain' }, { op: 'equals', label: 'equals' }, { op: 'startswith', label: 'starts with' }],
  enum: [{ op: 'in', label: 'is any of' }, { op: 'notin', label: 'is not' }],
  number: [{ op: 'gt', label: '>' }, { op: 'gte', label: '≥' }, { op: 'lt', label: '<' }, { op: 'lte', label: '≤' }, { op: 'eq', label: '=' }, { op: 'between', label: 'between' }],
}
const opsFor = (type) => OPS[type] || OPS.text
const opShort = { contains: '∋', notcontains: '∌', equals: '=', startswith: '^', in: ':', notin: '≠', gt: '>', gte: '≥', lt: '<', lte: '≤', eq: '=', between: '' }
const normOpts = (f) => (f.options || []).map((o) => (typeof o === 'object' ? o : { value: o, label: String(o) }))
const uid = () => Math.random().toString(36).slice(2, 8)
const clone = (v) => JSON.parse(JSON.stringify(v))

function condHasValue(c) {
  if (Array.isArray(c.value)) return c.value.filter((v) => v !== '' && v != null).length > 0
  return c.value !== '' && c.value != null
}
function activeConds(model, byKey) {
  return (model?.conditions || []).filter((c) => c.field && byKey[c.field] && condHasValue(c))
}
function condMatch(row, c, field) {
  const v = row[c.field]
  if (field.type === 'enum') {
    const arr = c.value || []
    if (!arr.length) return true
    return c.op === 'notin' ? !arr.includes(v) : arr.includes(v)
  }
  if (field.type === 'number') {
    const x = Number(v)
    if (c.op === 'between') {
      const [a, b] = c.value || []
      if ((a === '' || a == null) && (b === '' || b == null)) return true
      if (a !== '' && a != null && x < +a) return false
      if (b !== '' && b != null && x > +b) return false
      return true
    }
    const n = Number(c.value)
    if (c.value === '' || c.value == null || isNaN(n)) return true
    if (c.op === 'gt') return x > n
    if (c.op === 'gte') return x >= n
    if (c.op === 'lt') return x < n
    if (c.op === 'lte') return x <= n
    if (c.op === 'eq') return x === n
    return true
  }
  // text
  const s = String(v ?? '').toLowerCase(); const q = String(c.value ?? '').toLowerCase()
  if (!q) return true
  if (c.op === 'notcontains') return !s.includes(q)
  if (c.op === 'equals') return s === q
  if (c.op === 'startswith') return s.startsWith(q)
  return s.includes(q)
}
function applyFilters(rows, model, fields) {
  const byKey = Object.fromEntries(fields.map((f) => [f.key, f]))
  const active = activeConds(model, byKey)
  if (!active.length) return rows
  return rows.filter((row) => {
    const res = active.map((c) => condMatch(row, c, byKey[c.field]))
    return model.join === 'OR' ? res.some(Boolean) : res.every(Boolean)
  })
}
function describeCond(c, field) {
  if (field.type === 'enum') return `${field.label}: ${(c.value || []).join(', ')}`
  if (field.type === 'number' && c.op === 'between') { const [a, b] = c.value || []; return `${field.label} ${a || '…'}–${b || '…'}` }
  return `${field.label} ${opShort[c.op] || ''} ${Array.isArray(c.value) ? c.value.join(', ') : c.value}`.trim()
}

function FilterRow({ row, fields, onChange, onRemove }) {
  const field = fields.find((f) => f.key === row.field) || fields[0]
  const ops = opsFor(field.type)
  const opts = normOpts(field)
  const setField = (k) => { const f = fields.find((x) => x.key === k); onChange({ ...row, field: k, op: opsFor(f.type)[0].op, value: f.type === 'enum' ? [] : '' }) }
  const setOp = (op) => onChange({ ...row, op, value: op === 'between' ? ['', ''] : (Array.isArray(row.value) && field.type === 'number' ? '' : row.value) })
  return (
    <div className="gf-row">
      <select className="gf-field" value={row.field} onChange={(e) => setField(e.target.value)}>
        {fields.map((f) => <option key={f.key} value={f.key}>{f.label}</option>)}
      </select>
      <select className="gf-op" value={row.op} onChange={(e) => setOp(e.target.value)}>
        {ops.map((o) => <option key={o.op} value={o.op}>{o.label}</option>)}
      </select>
      {field.type === 'enum' ? (
        <div className="gf-enum">
          {opts.map((o) => {
            const on = (row.value || []).includes(o.value)
            return <span key={o.value} className={`chip ${on ? 'on' : ''}`} onClick={() => { const set = new Set(row.value || []); on ? set.delete(o.value) : set.add(o.value); onChange({ ...row, value: [...set] }) }}>{o.label}</span>
          })}
        </div>
      ) : field.type === 'number' && row.op === 'between' ? (
        <span className="gf-between">
          <input type="number" value={row.value?.[0] ?? ''} placeholder="min" onChange={(e) => onChange({ ...row, value: [e.target.value, row.value?.[1] ?? ''] })} />
          <span className="muted">–</span>
          <input type="number" value={row.value?.[1] ?? ''} placeholder="max" onChange={(e) => onChange({ ...row, value: [row.value?.[0] ?? '', e.target.value] })} />
        </span>
      ) : field.type === 'number' ? (
        <input className="gf-val" type="number" value={row.value ?? ''} placeholder="value" onChange={(e) => onChange({ ...row, value: e.target.value })} />
      ) : (
        <input className="gf-val" type="text" value={row.value ?? ''} placeholder="text…" onChange={(e) => onChange({ ...row, value: e.target.value })} />
      )}
      <button className="gf-x" onClick={onRemove} title="Remove"><Icon name="x" size={13} /></button>
    </div>
  )
}

function FilterBar({ id, fields, value, onChange }) {
  const model = value || { join: 'AND', conditions: [] }
  const byKey = useMemo(() => Object.fromEntries(fields.map((f) => [f.key, f])), [fields])
  const active = activeConds(model, byKey)
  const [plans, setPlans] = useState(() => (id ? planStore.get(id) : null) || [])
  const [planName, setPlanName] = useState('')

  useEffect(() => { if (id) filterStore.set(id, model) }, [id, model])

  const set = (m) => onChange(m)
  const addCond = () => { const f = fields[0]; set({ ...model, conditions: [...model.conditions, { id: uid(), field: f.key, op: opsFor(f.type)[0].op, value: f.type === 'enum' ? [] : '' }] }) }
  const updateCond = (i, nc) => set({ ...model, conditions: model.conditions.map((c, j) => (j === i ? nc : c)) })
  const removeCond = (i) => set({ ...model, conditions: model.conditions.filter((c, j) => j !== i) })
  const removeById = (cid) => set({ ...model, conditions: model.conditions.filter((c) => c.id !== cid) })
  const clearAll = () => set({ join: model.join, conditions: [] })
  const savePlan = () => {
    const name = planName.trim(); if (!name) return
    const next = [...plans.filter((p) => p.name !== name), { name, model: clone(model) }]
    setPlans(next); if (id) planStore.set(id, next); setPlanName('')
  }
  const applyPlan = (p) => set(clone(p.model))
  const deletePlan = (name) => { const next = plans.filter((p) => p.name !== name); setPlans(next); if (id) planStore.set(id, next) }

  return (
    <span className="fb-wrap">
      <Popover width={460} trigger={(
        <button className={`btn ghost sm ${active.length ? 'fb-on' : ''}`}>
          <Icon name="filter" size={13} />Filters{active.length > 0 && <span className="fb-badge">{active.length}</span>}
        </button>
      )}>
        {(close) => (
          <div className="fpanel">
            {plans.length > 0 && (
              <div className="fp-plans">
                <div className="cm-head">Saved Plans</div>
                {plans.map((p) => (
                  <div key={p.name} className="fp-plan">
                    <button className="fp-apply" onClick={() => { applyPlan(p); close() }}>{p.name}<span className="muted"> · {(p.model.conditions || []).length}</span></button>
                    <button className="gf-x" onClick={() => deletePlan(p.name)} title="Delete plan"><Icon name="x" size={12} /></button>
                  </div>
                ))}
              </div>
            )}
            <div className="fp-head">
              <span className="cm-head" style={{ padding: 0 }}>Match</span>
              <div className="seg">
                <button className={model.join === 'AND' ? 'on' : ''} onClick={() => set({ ...model, join: 'AND' })}>ALL conditions</button>
                <button className={model.join === 'OR' ? 'on' : ''} onClick={() => set({ ...model, join: 'OR' })}>ANY condition</button>
              </div>
            </div>
            <div className="fp-rows">
              {model.conditions.length === 0 && <div className="muted" style={{ padding: '6px 4px' }}>No filters yet — add one below.</div>}
              {model.conditions.map((c, i) => (
                <FilterRow key={c.id} row={c} fields={fields} onChange={(nc) => updateCond(i, nc)} onRemove={() => removeCond(i)} />
              ))}
            </div>
            <div className="fp-foot">
              <Btn sm ghost icon="plus" onClick={addCond}>Add filter</Btn>
              <div style={{ flex: 1 }} />
              {model.conditions.length > 0 && <Btn sm ghost onClick={clearAll}>Clear all</Btn>}
            </div>
            <div className="fp-save">
              <input value={planName} placeholder="Save these filters as a Plan…" onChange={(e) => setPlanName(e.target.value)}
                onKeyDown={(e) => { if (e.key === 'Enter') savePlan() }} />
              <Btn sm primary onClick={savePlan}>Save Plan</Btn>
            </div>
          </div>
        )}
      </Popover>
      {active.map((c) => (
        <span key={c.id} className="fchip">{describeCond(c, byKey[c.field])}<Icon name="x" size={11} onClick={() => removeById(c.id)} /></span>
      ))}
    </span>
  )
}

/* Inline-editable numeric cell (click to edit, Enter/blur commit, Esc cancel). */
function EditableNum({ value, onCommit, prefix = '', dec = 0, align = 'flex-end' }) {
  const [editing, setEditing] = useState(false)
  const [val, setVal] = useState(value)
  const editingRef = useRef(false)
  useEffect(() => { if (!editingRef.current) setVal(value) }, [value])
  const start = () => { editingRef.current = true; setVal(value); setEditing(true) }
  const finish = (save) => {
    if (!editingRef.current) return
    editingRef.current = false; setEditing(false)
    if (save) { const n = Number(val); if (!isNaN(n) && n !== value) onCommit(n) } else setVal(value)
  }
  if (editing) {
    return (
      <span className="editnum">
        <input autoFocus type="number" value={val}
          onChange={(e) => setVal(e.target.value)}
          onKeyDown={(e) => { if (e.key === 'Enter') finish(true); else if (e.key === 'Escape') finish(false) }}
          onBlur={() => finish(true)} onClick={(e) => e.stopPropagation()} />
      </span>
    )
  }
  return (
    <span className="bidcell editable" style={{ justifyContent: align }} onClick={start} title="Click to edit">
      {prefix}{Number(value).toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec })}
      <Icon name="edit" size={12} className="ed" />
    </span>
  )
}

/* Inline State dropdown: Enabled / Paused / Archived. */
function StateSelect({ value, onChange, options = ['Enabled', 'Paused', 'Archived'] }) {
  const tone = { Enabled: 'green', Paused: 'gray', Archived: 'gray' }[value] || 'gray'
  return (
    <Popover width={150} trigger={(
      <button className={`statesel ${tone}`}><span className="dot" />{value}<Icon name="chevDown" size={11} /></button>
    )}>
      {(close) => (
        <div className="colmenu"><div className="cm-list">
          {options.map((s) => <div key={s} className={`cm-opt ${value === s ? 'on' : ''}`} onClick={() => { onChange(s); close() }}>{s}</div>)}
        </div></div>
      )}
    </Popover>
  )
}

/* Generic modal dialog. */
function Modal({ title, sub, onClose, children, footer, width = 440 }) {
  useEffect(() => {
    const k = (e) => { if (e.key === 'Escape') onClose() }
    document.addEventListener('keydown', k); return () => document.removeEventListener('keydown', k)
  }, [])
  return (
    <div className="modal-ov" onMouseDown={onClose}>
      <div className="modal" style={{ width }} onMouseDown={(e) => e.stopPropagation()}>
        <div className="modal-h">
          <div><h3>{title}</h3>{sub && <div className="sub">{sub}</div>}</div>
          <button className="gf-x" onClick={onClose}><Icon name="x" size={15} /></button>
        </div>
        <div className="modal-b">{children}</div>
        {footer && <div className="modal-f">{footer}</div>}
      </div>
    </div>
  )
}

/* Toast system — call toast(message) from anywhere; ToastHost renders them. */
const toastListeners = new Set()
let toastSeq = 0
function toast(message, kind = 'success') {
  const t = { id: ++toastSeq, message, kind }
  toastListeners.forEach((fn) => fn(t))
}
function ToastHost() {
  const [items, setItems] = useState([])
  useEffect(() => {
    const fn = (t) => { setItems((x) => [...x, t]); setTimeout(() => setItems((x) => x.filter((i) => i.id !== t.id)), 3800) }
    toastListeners.add(fn); return () => toastListeners.delete(fn)
  }, [])
  return (
    <div className="toasthost">
      {items.map((t) => (
        <div key={t.id} className={`toast ${t.kind}`}>
          <Icon name={t.kind === 'success' ? 'check' : t.kind === 'error' ? 'x' : 'bulb'} size={15} />
          <span>{t.message}</span>
        </div>
      ))}
    </div>
  )
}

/* Persistence for user-created entities (campaigns, rules) — survives reload. */
const createdStore = {
  get(kind) { try { return JSON.parse(localStorage.getItem('chcreated:' + kind)) || [] } catch (e) { return [] } },
  set(kind, arr) { try { localStorage.setItem('chcreated:' + kind, JSON.stringify(arr)) } catch (e) { /* ignore */ } },
  add(kind, item) { const arr = createdStore.get(kind); arr.unshift(item); createdStore.set(kind, arr); return arr },
}

/* ============================================================================
   Phase 5 — persistent inline/bulk edit overrides (survive reload).
   `chedits:<id>` holds { rowId: { field: value, ... } }.
   ========================================================================== */
const editStore = {
  get(id) { try { return JSON.parse(localStorage.getItem('chedits:' + id)) || {} } catch (e) { return {} } },
  set(id, v) { try { localStorage.setItem('chedits:' + id, JSON.stringify(v)) } catch (e) { /* ignore */ } },
}
function usePersistentOverrides(id) {
  const [overrides, setOverrides] = useState(() => editStore.get(id))
  useEffect(() => { if (id) editStore.set(id, overrides) }, [id, overrides])
  return [overrides, setOverrides]
}

/* ============================================================================
   Phase 5 — CSV / Excel export. Field schema = [{ key, label }] (the same
   *_FIELDS arrays the FilterBar uses). Exports the rows passed in (already
   filtered) as scalar values — no React render involved.
   ========================================================================== */
function _download(filename, text, mime) {
  const blob = new Blob([text], { type: mime })
  const url = URL.createObjectURL(blob)
  const a = document.createElement('a')
  a.href = url; a.download = filename
  document.body.appendChild(a); a.click(); a.remove()
  setTimeout(() => URL.revokeObjectURL(url), 1000)
}
function _cell(row, f) {
  const v = f.csv ? f.csv(row) : row[f.key]
  return (v == null || (typeof v === 'number' && isNaN(v))) ? '' : v
}
function exportCSV(filename, fields, rows) {
  const esc = (v) => { const s = String(v); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s }
  const header = fields.map((f) => esc(f.label)).join(',')
  const body = rows.map((r) => fields.map((f) => esc(_cell(r, f))).join(',')).join('\r\n')
  _download(filename, '﻿' + header + '\r\n' + body, 'text/csv;charset=utf-8;')
}
function exportXLS(filename, fields, rows) {
  const esc = (v) => String(v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
  const isNum = (v) => v !== '' && v != null && !isNaN(Number(v))
  const head = '<tr>' + fields.map((f) => `<th style="background:#1a4fd6;color:#fff;font-weight:700;border:1px solid #c9d2e3;padding:4px 8px;text-align:left">${esc(f.label)}</th>`).join('') + '</tr>'
  const body = rows.map((r) => '<tr>' + fields.map((f) => { const v = _cell(r, f); return `<td style="border:1px solid #dfe4ee;padding:3px 8px"${isNum(v) ? ' x:num' : ''}>${esc(v)}</td>` }).join('') + '</tr>').join('')
  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>Export</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body><table cellspacing="0">${head}${body}</table></body></html>`
  _download(filename, html, 'application/vnd.ms-excel;charset=utf-8;')
}
function ExportMenu({ name = 'export', fields, rows }) {
  const stamp = new Date().toISOString().slice(0, 10)
  const fn = (ext) => `${name}-${stamp}.${ext}`
  const done = (n, ext) => toast(`Exported ${n} row${n === 1 ? '' : 's'} to ${ext.toUpperCase()}`)
  return (
    <Popover align="right" width={170} trigger={<Btn icon="download">Export</Btn>}>
      {(close) => (
        <div className="colmenu"><div className="cm-list">
          <div className="cm-opt" onClick={() => { exportCSV(fn('csv'), fields, rows); done(rows.length, 'csv'); close() }}>CSV (.csv)</div>
          <div className="cm-opt" onClick={() => { exportXLS(fn('xls'), fields, rows); done(rows.length, 'xls'); close() }}>Excel (.xls)</div>
          <div className="cm-foot muted">{rows.length.toLocaleString()} rows · current filter</div>
        </div></div>
      )}
    </Popover>
  )
}

/* ============================================================================
   Phase 5 — real date-range scaling + period-compare.
   Mock metrics represent a ~30-day baseline. scaleForRange() produces the
   current-period rows for the selected range plus a deterministic prior-period
   map so the grid/KPIs can show genuine vs-prev deltas.
   ========================================================================== */
const RANGE_DAYS = { 'Today': 1, 'Yesterday': 1, 'Last 7 days': 7, 'Last 30 days': 30, 'This month': 30, 'Last month': 30, 'Custom…': 30 }
function rangeDays(label) { return RANGE_DAYS[label] != null ? RANGE_DAYS[label] : 30 }

// Resolve a range label (+ optional custom {start,end}) into { label, days, key }.
// "This month"/"Last month" use the real calendar; "Custom…" uses the picked dates.
function resolveRange(label, custom) {
  const now = new Date()
  const dayMs = 86400000
  const atMidnight = (d) => new Date(d.getFullYear(), d.getMonth(), d.getDate())
  const fmt = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
  if (label === 'Custom…' && custom && custom.start && custom.end) {
    const s = new Date(custom.start + 'T00:00:00'), e = new Date(custom.end + 'T00:00:00')
    if (!isNaN(s) && !isNaN(e)) {
      const lo = s <= e ? s : e, hi = s <= e ? e : s
      const days = Math.max(1, Math.round((atMidnight(hi) - atMidnight(lo)) / dayMs) + 1)
      return { label: `${fmt(lo)} – ${fmt(hi)}`, days, key: `custom:${custom.start}_${custom.end}` }
    }
  }
  if (label === 'This month') return { label, days: now.getDate(), key: `month:${now.getFullYear()}-${now.getMonth()}` }
  if (label === 'Last month') {
    const lastDayPrev = new Date(now.getFullYear(), now.getMonth(), 0)
    return { label, days: lastDayPrev.getDate(), key: `month:${lastDayPrev.getFullYear()}-${lastDayPrev.getMonth()}` }
  }
  return { label, days: rangeDays(label), key: label }
}
const periodFactor = (k) => 0.85 + hashUnit(k) * 0.30 // 0.85 .. 1.15
function scaleRow(row, days, periodKey, idKey = 'id') {
  const f = days / 30
  const id = String(row[idKey])
  const demand = periodFactor(id + '|d|' + periodKey) // moves sales/orders/units
  const cost = periodFactor(id + '|c|' + periodKey)   // moves spend/impr/clicks
  const impr = Math.round((row.impr || 0) * f * cost)
  const clk = Math.round((row.clk || 0) * f * cost)
  const spend = (row.spend || 0) * f * cost
  const orders = Math.round((row.orders || 0) * f * demand)
  const sales = (row.sales || 0) * f * demand
  const units = Math.round((row.units || 0) * f * demand)
  const ntb = Math.round((row.ntb || 0) * f * demand)
  return {
    ...row, impr, clk, spend, orders, sales, units, ntb,
    ctr: impr ? (clk / impr) * 100 : 0, cpc: clk ? spend / clk : 0,
    acos: sales ? (spend / sales) * 100 : 0, roas: spend ? sales / spend : 0,
    cvr: clk ? (orders / clk) * 100 : 0, cpa: orders ? spend / orders : 0,
    aov: orders ? sales / orders : 0,
  }
}
// `range` may be a label string OR a resolved object { label, days, key }.
function scaleForRange(rows, range, idKey = 'id') {
  const days = typeof range === 'object' ? range.days : rangeDays(range)
  const key = typeof range === 'object' ? range.key : range
  const cur = rows.map((r) => scaleRow(r, days, key, idKey))
  const prev = {}
  rows.forEach((r) => { prev[r[idKey]] = scaleRow(r, days, key + ':prev', idKey) })
  return { rows: cur, prev, days }
}


/* ===================== src/state.jsx ===================== */

const Ctx = createContext(null)

function todayISO() { return new Date().toISOString().slice(0, 10) }
function CustomRangePanel({ initial, onApply, onClose }) {
  const [start, setStart] = useState(initial?.start || (() => { const d = new Date(); d.setDate(d.getDate() - 6); return d.toISOString().slice(0, 10) })())
  const [end, setEnd] = useState(initial?.end || todayISO())
  const valid = start && end
  return (
    <div style={{ padding: 4 }}>
      <div className="cm-head" style={{ padding: '2px 6px 8px' }}>Custom date range</div>
      <label className="fld" style={{ marginBottom: 8 }}>Start<input type="date" value={start} max={end || todayISO()} onChange={(e) => setStart(e.target.value)} /></label>
      <label className="fld" style={{ marginBottom: 10 }}>End<input type="date" value={end} min={start} max={todayISO()} onChange={(e) => setEnd(e.target.value)} /></label>
      <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
        <button className="btn ghost sm" onClick={onClose}>Cancel</button>
        <button className="btn primary sm" disabled={!valid} onClick={() => onApply({ start, end })}>Apply</button>
      </div>
    </div>
  )
}

/* ---- bulk bid / budget math ---- */
const round2 = (n) => Math.round(n * 100) / 100
const applyBidOp = (cur, suggested, mode, amt) => {
  if (mode === 'set') return round2(amt)
  if (mode === 'inc') return round2(cur * (1 + amt / 100))
  if (mode === 'dec') return round2(cur * (1 - amt / 100))
  if (mode === 'suggested') return round2(suggested)
  if (mode === 'ceiling') return round2(Math.min(cur, amt))
  if (mode === 'floor') return round2(Math.max(cur, amt))
  return cur
}
const applyBudgetOp = (cur, mode, amt) => {
  if (mode === 'set') return round2(amt)
  if (mode === 'inc') return round2(cur * (1 + amt / 100))
  if (mode === 'dec') return round2(cur * (1 - amt / 100))
  return cur
}

function BulkBidModal({ count, currency, onApply, onClose, suggestedLabel = 'suggested', initialMode = 'set' }) {
  const [mode, setMode] = useState(initialMode)
  const [amt, setAmt] = useState('')
  const modes = [['set', 'Set to value'], ['inc', 'Increase by %'], ['dec', 'Decrease by %'], ['suggested', `Set to ${suggestedLabel}`], ['ceiling', 'Set ceiling (max)'], ['floor', 'Set floor (min)']]
  const needsAmt = mode !== 'suggested'
  const isPct = mode === 'inc' || mode === 'dec'
  return (
    <Modal title="Adjust bids" sub={`${count} line item${count === 1 ? '' : 's'} selected`} onClose={onClose} footer={<>
      <Btn ghost onClick={onClose}>Cancel</Btn>
      <Btn primary disabled={needsAmt && amt === ''} onClick={() => onApply(mode, Number(amt))}>Apply to {count}</Btn>
    </>}>
      <label className="fld">Action
        <select value={mode} onChange={(e) => setMode(e.target.value)}>{modes.map(([v, l]) => <option key={v} value={v}>{l}</option>)}</select>
      </label>
      {needsAmt && (
        <label className="fld">{isPct ? 'Percent (%)' : `Amount (${currency})`}
          <input type="number" value={amt} autoFocus placeholder={isPct ? 'e.g. 10' : `e.g. 1.20`} onChange={(e) => setAmt(e.target.value)} />
